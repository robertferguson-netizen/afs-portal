<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="pragma" content="no-cache"/>
<meta http-equiv="expires" content="0"/>
<!-- AFS Portal v3.18 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="AFS Portal"/>
<link rel="manifest" href="/afs-portal/manifest.json"/>
<link rel="apple-touch-icon" href="/afs-portal/icon-192.png"/>
<title>AFS Internal Operations Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0d1f3c;
  --navy2:#152a4e;
  --navy3:#1e3660;
  --mid:#2a4a7f;
  --accent:#e8312a;
  --accent2:#ff5c56;
  --gold:#f5a623;
  --white:#ffffff;
  --offwhite:#f4f6fa;
  --light:#e8edf5;
  --muted:#8a9bbf;
  --border:#2a3f63;
  --border-light:#dde3ef;
  --text:#0d1f3c;
  --card:#ffffff;
  --green:#00a86b;
  --green-light:#e6f7f1;
  --red:#e8312a;
  --red-light:#fef0ef;
  --amber:#f5a623;
  --amber-light:#fef8ec;
  --font:'Barlow',sans-serif;
  --font-display:'Barlow Condensed',sans-serif;
}
body{font-family:var(--font);background:var(--offwhite);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── LOGIN SCREEN ─────────────────────────────── */
#login-screen{
  position:fixed;inset:0;z-index:1000;
  background:var(--navy);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.login-logo{
  font-family:var(--font-display);font-size:42px;font-weight:800;
  color:var(--white);letter-spacing:0.04em;margin-bottom:4px;
}
.login-logo span{color:var(--accent);}
.login-tagline{font-size:13px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:48px;}
.login-card{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;padding:36px;width:100%;max-width:440px;
}
.login-card h2{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--white);margin-bottom:6px;}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:28px;}
.portal-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
.portal-tab{
  padding:14px;border-radius:7px;border:2px solid rgba(255,255,255,0.1);
  background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;
  font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;letter-spacing:0.05em;text-transform:uppercase;
}
.portal-tab:hover{border-color:rgba(255,255,255,0.3);color:var(--white);}
.portal-tab.active{border-color:var(--accent);background:rgba(232,49,42,0.15);color:var(--white);}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:6px;}
.login-field select{
  width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:var(--white);font-family:var(--font);font-size:14px;padding:11px 14px;
  border-radius:6px;outline:none;cursor:pointer;
}
.login-field select option{background:var(--navy2);color:var(--white);}
.login-btn{
  width:100%;padding:14px;background:var(--accent);color:var(--white);
  font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;border:none;border-radius:7px;cursor:pointer;
  transition:background 0.2s;margin-top:8px;
}
.login-btn:hover{background:var(--accent2);}
.login-divider{height:1px;background:rgba(255,255,255,0.08);margin:20px 0;}

/* ── APP SHELL ────────────────────────────────── */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.show{display:flex;}

/* ── TOP NAV ──────────────────────────────────── */
.topnav{
  background:var(--navy);height:60px;display:flex;align-items:center;
  justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(13,31,60,0.3);
}
.topnav-left{display:flex;align-items:center;gap:32px;}
.topnav-logo{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--white);letter-spacing:0.06em;}
.topnav-logo span{color:var(--accent);}
.topnav-portal{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;
  padding:4px 10px;border-radius:3px;
}
.portal-logistics{background:rgba(245,166,35,0.2);color:var(--gold);}
.portal-workshop{background:rgba(0,168,107,0.2);color:var(--green);}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{
  padding:8px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);
  cursor:pointer;border-radius:5px;transition:all 0.15s;letter-spacing:0.02em;
  border:none;background:transparent;font-family:var(--font);
}
.nav-tab:hover{color:var(--white);background:rgba(255,255,255,0.08);}
.nav-tab.active{color:var(--white);background:rgba(255,255,255,0.12);}
.topnav-right{display:flex;align-items:center;gap:16px;}
.user-pill{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.08);border-radius:20px;padding:6px 14px 6px 8px;
}
.user-avatar{
  width:26px;height:26px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--white);
}
.user-name{font-size:12px;font-weight:600;color:var(--white);}
.logout-btn{
  font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none;
  font-family:var(--font);padding:4px 8px;border-radius:4px;
}
.logout-btn:hover{color:var(--white);}

/* ── PAGE CONTENT ─────────────────────────────── */
.page-content{flex:1;padding:28px;max-width:1200px;width:100%;margin:0 auto;}
.page{display:none;}
.page.active{display:block;}

/* ── PAGE HEADER ──────────────────────────────── */
.page-header{margin-bottom:28px;}
.page-header h1{font-family:var(--font-display);font-size:32px;font-weight:800;color:var(--navy);letter-spacing:0.02em;}
.page-header p{font-size:14px;color:var(--muted);margin-top:4px;}

/* ── CARDS ────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border-light);border-radius:10px;padding:24px;margin-bottom:20px;}
.card-title{font-family:var(--font-display);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--navy);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title-accent{width:3px;height:16px;background:var(--accent);border-radius:2px;display:inline-block;}

/* ── FORM ELEMENTS ────────────────────────────── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row-1{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:16px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy);opacity:0.7;}
.field input,.field select,.field textarea{
  background:var(--offwhite);border:1.5px solid var(--border-light);
  color:var(--text);font-family:var(--font);font-size:14px;
  padding:10px 13px;border-radius:6px;outline:none;transition:border-color 0.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);background:var(--white);}
.field textarea{resize:vertical;min-height:80px;}
.field input.reg-input{font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:0.08em;}
.field-hint{font-size:11px;color:var(--muted);margin-top:3px;}

/* ── JOB TYPE SELECTOR ────────────────────────── */
.job-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.job-btn{
  background:var(--offwhite);border:2px solid var(--border-light);
  border-radius:8px;padding:14px 8px;cursor:pointer;text-align:center;
  font-family:var(--font);font-size:11px;font-weight:700;color:var(--muted);
  transition:all 0.15s;letter-spacing:0.04em;text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.job-btn:hover{border-color:var(--navy);color:var(--navy);background:var(--white);}
.job-btn.selected{border-color:var(--accent);background:rgba(232,49,42,0.05);color:var(--accent);}
.job-icon{font-size:22px;line-height:1;}

/* ── COST DISPLAY ─────────────────────────────── */
.cost-panel{
  background:var(--navy);border-radius:8px;padding:18px 22px;
  display:flex;align-items:center;justify-content:space-between;margin-top:12px;
}
.cost-panel-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5);}
.cost-panel-basis{font-size:12px;color:rgba(255,255,255,0.4);margin-top:3px;}
.cost-panel-value{font-family:var(--font-display);font-size:36px;font-weight:800;color:var(--white);}
.cost-panel-value span{font-size:18px;opacity:0.6;margin-right:2px;}

/* ── MILEAGE CALCULATOR ───────────────────────── */
.mileage-calc{background:var(--offwhite);border:1.5px solid var(--border-light);border-radius:8px;padding:16px;margin-top:12px;}
.mileage-calc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy);margin-bottom:12px;opacity:0.7;}
.postcode-row{display:grid;grid-template-columns:1fr auto 1fr auto;gap:10px;align-items:end;margin-bottom:12px;}
.postcode-arrow{font-size:18px;color:var(--muted);padding-bottom:10px;text-align:center;}
.calc-btn{
  padding:10px 16px;background:var(--navy);color:var(--white);border:none;
  border-radius:6px;font-family:var(--font);font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;letter-spacing:0.04em;height:42px;
}
.calc-btn:hover{background:var(--navy2);}
.mileage-result{
  display:none;background:var(--white);border:1px solid var(--border-light);
  border-radius:6px;padding:12px 16px;font-size:13px;color:var(--text);
}
.mileage-result.show{display:flex;justify-content:space-between;align-items:center;}
.mileage-breakdown{font-size:11px;color:var(--muted);margin-top:4px;}
.manual-miles{margin-top:10px;}

/* ── BUTTONS ──────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:6px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;letter-spacing:0.04em;text-transform:uppercase;}
.btn-primary{background:var(--accent);color:var(--white);}
.btn-primary:hover{background:var(--accent2);}
.btn-navy{background:var(--navy);color:var(--white);}
.btn-navy:hover{background:var(--navy2);}
.btn-ghost{background:transparent;color:var(--navy);border:2px solid var(--border-light);}
.btn-ghost:hover{border-color:var(--navy);}
.btn-green{background:var(--green);color:var(--white);}
.btn-green:hover{background:#008f5b;}
.btn-amber{background:var(--amber);color:var(--white);}
.btn-red{background:var(--red);color:var(--white);}
.btn-sm{padding:7px 14px;font-size:11px;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}

/* ── STAT CARDS ───────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{
  background:var(--white);border:1px solid var(--border-light);border-radius:10px;
  padding:20px;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.s-red::before{background:var(--accent);}
.stat-card.s-green::before{background:var(--green);}
.stat-card.s-amber::before{background:var(--amber);}
.stat-card.s-navy::before{background:var(--navy);}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px;}
.stat-value{font-family:var(--font-display);font-size:36px;font-weight:800;color:var(--navy);line-height:1;}
.stat-sub{font-size:12px;color:var(--muted);margin-top:6px;}

/* ── TABLE ────────────────────────────────────── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:2px solid var(--border-light);white-space:nowrap;}
td{padding:12px;border-bottom:1px solid var(--border-light);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--offwhite);}
.ref-badge{font-family:'Barlow Condensed',monospace;font-size:13px;font-weight:700;background:var(--navy);color:var(--white);padding:3px 9px;border-radius:4px;letter-spacing:0.05em;}
.reg-badge{font-weight:700;font-size:13px;color:var(--navy);letter-spacing:0.05em;}

/* ── STATUS TAGS ──────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;}
.tag::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:0.8;}
.tag-pending{background:var(--amber-light);color:#b57a00;}
.tag-accepted{background:rgba(42,74,127,0.1);color:var(--navy);}
.tag-declined{background:var(--red-light);color:var(--red);}
.tag-completed{background:var(--green-light);color:#007a50;}
.tag-cancelled{background:#f0f0f5;color:#666;border:1px solid #ccc;}
.tag-type{background:var(--offwhite);color:var(--navy);border:1px solid var(--border-light);}

/* ── FILTER ROW ───────────────────────────────── */
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-row select,.filter-row input{
  background:var(--white);border:1.5px solid var(--border-light);color:var(--text);
  font-family:var(--font);font-size:13px;padding:8px 12px;border-radius:6px;outline:none;
}
.filter-row input{flex:1;min-width:160px;}
.filter-row select:focus,.filter-row input:focus{border-color:var(--navy);}

/* ── BOOKING DETAIL MODAL ─────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(13,31,60,0.6);z-index:500;align-items:center;justify-content:center;padding:20px;}
.overlay.show{display:flex;}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-header{background:var(--navy);padding:20px 24px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.modal-header h2{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--white);letter-spacing:0.05em;}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.5);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;}
.modal-close:hover{color:var(--white);}
.modal-body{padding:24px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.detail-item{background:var(--offwhite);border-radius:6px;padding:12px;}
.detail-item-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:4px;}
.detail-item-value{font-size:14px;font-weight:600;color:var(--navy);}
.detail-item.full{grid-column:1/-1;}
.notes-box{background:var(--offwhite);border-radius:6px;padding:14px;margin-bottom:16px;}
.notes-box label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);display:block;margin-bottom:8px;}
.notes-box textarea{width:100%;background:var(--white);border:1.5px solid var(--border-light);border-radius:5px;font-family:var(--font);font-size:13px;padding:10px;outline:none;resize:vertical;min-height:80px;}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap;}

/* ── SUCCESS OVERLAY ──────────────────────────── */
.success-overlay{display:none;position:fixed;inset:0;background:rgba(13,31,60,0.7);z-index:600;align-items:center;justify-content:center;}
.success-overlay.show{display:flex;}
.success-modal{background:var(--white);border-radius:12px;padding:40px;text-align:center;max-width:420px;width:90%;}
.success-icon{font-size:56px;margin-bottom:16px;display:block;}
.success-ref{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--navy);margin:8px 0;}
.success-detail{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px;white-space:pre-line;}
.wa-panel{background:var(--offwhite);border:1.5px solid var(--border-light);border-radius:8px;padding:16px;text-align:left;margin-bottom:20px;}
.wa-panel-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--green);margin-bottom:8px;}
.wa-panel-text{font-family:monospace;font-size:12px;white-space:pre-wrap;color:var(--text);line-height:1.6;}

/* ── CHARTS ───────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.chart-bar-wrap{margin-top:12px;}
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.chart-bar-label{font-size:12px;font-weight:600;color:var(--navy);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chart-bar-track{flex:1;height:24px;background:var(--offwhite);border-radius:4px;overflow:hidden;}
.chart-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;display:flex;align-items:center;padding-left:8px;}
.chart-bar-fill span{font-size:11px;font-weight:700;color:var(--white);}
.chart-bar-val{font-size:12px;font-weight:700;color:var(--navy);width:60px;text-align:right;flex-shrink:0;}
.pie-wrap{display:flex;align-items:center;gap:20px;margin-top:12px;}
.pie-legend{flex:1;}
.pie-legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;}
.pie-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.perf-card{background:var(--offwhite);border-radius:8px;padding:14px;}
.perf-card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;}
.perf-card-value{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--navy);}
.perf-card-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* ── EMPTY STATE ──────────────────────────────── */
.empty-state{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-icon{font-size:40px;display:block;margin-bottom:12px;opacity:0.3;}
.empty-state p{font-size:14px;}

/* ── WARN BOX ─────────────────────────────────── */
.warn-box{background:var(--amber-light);border:1.5px solid #f5d080;border-radius:6px;padding:10px 14px;font-size:12px;color:#7a5000;margin-top:12px;}
.info-box{background:rgba(42,74,127,0.06);border:1.5px solid rgba(42,74,127,0.15);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--navy);margin-top:12px;}

/* ── TIMELINE ─────────────────────────────────── */
.timeline{display:flex;gap:0;margin:16px 0;}
.timeline-step{flex:1;text-align:center;position:relative;}
.timeline-step:not(:last-child)::after{content:'';position:absolute;top:14px;left:50%;right:-50%;height:2px;background:var(--border-light);}
.timeline-step.done:not(:last-child)::after{background:var(--green);}
.timeline-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border-light);background:var(--white);margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;z-index:1;}
.timeline-step.done .timeline-dot{background:var(--green);border-color:var(--green);color:var(--white);}
.timeline-step.current .timeline-dot{background:var(--amber);border-color:var(--amber);color:var(--white);}
.timeline-step-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}
.timeline-step.done .timeline-step-label{color:var(--green);}
.timeline-step.current .timeline-step-label{color:var(--amber);}

/* ── RESPONSIVE ───────────────────────────────── */
@media(max-width:768px){
  .job-grid{grid-template-columns:repeat(2,1fr);}
  .stats-grid{grid-template-columns:1fr 1fr;}

/* ── SPIN ─────────────────────────────────────── */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.dyn{display:none;}
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--navy);border-top:1px solid rgba(255,255,255,0.1);
  z-index:100;padding:8px 0 12px;
}
.bottom-nav-items{display:flex;justify-content:space-around;align-items:center;}
.bottom-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:4px 12px;border-radius:8px;
  font-size:10px;font-weight:600;color:rgba(255,255,255,0.5);
  letter-spacing:0.04em;text-transform:uppercase;border:none;

}
.bottom-nav-item.active{color:white;}

/* ── CALENDAR ─────────────────────────────────── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}

.cal-more{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px;}

/* ── DISPATCH BOARD ───────────────────────────── */
.dispatch-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}

<script>
// ═══════════════════════════════════════════════
// DATA STORE
// ═══════════════════════════════════════════════
const STAFF = {
  logistics: ['Craig Cameron','Kieran Hughes','Natalia Lewandowska','Kenny Craig','Workshop'],
  workshop:  ['Robert Ferguson','David Armit','Stuart Finlayson','Workshop Assistants']
};

// ── SHARED DATABASE — SharePoint REST API ──────────────────────────────────
const SP_SITE = 'https://afslogisticsltd.sharepoint.com/sites/AFSWorkshop';
const SP_LIST = 'AFSBookings';

// Convert SharePoint item to booking object
function spToBooking(item) {
  return {
    id: item.Id,
    ref: item.BookingRef || item.Title,
    type: item.JobType ? Object.keys(JOB_MAP).find(k => JOB_MAP[k].label === item.JobType) || '' : '',
    typeLabel: item.JobType || '',
    status: item.Status || 'Pending',
    raisedBy: item.RaisedBy || '',
    submittedAt: item.SubmittedAt || '',
    dateRequired: item.DateRequired || '',
    timeRequired: item.TimeRequired || '',
    priority: item.Priority || 'Standard',
    reg: item.VehicleReg || '',
    make: item.MakeModel || '',
    chargeTo: item.ChargeTo || '',
    costCode: item.CostCode || '',
    cost: parseFloat(String(item.Cost||0).replace(/[^0-9.]/g,'')) || 0,
    miles: parseFloat(String(item.Miles||0).replace(/[^0-9.]/g,'')) || 0,
    notes: item.Notes || '',
    workshopNotes: item.WorkshopNotes || '',
    acceptedAt: item.AcceptedAt || null,
    acceptedBy: item.AcceptedBy || null,
    completedAt: item.CompletedAt || null,
    declinedAt: item.DeclinedAt || null,
    cancelledAt: item.CancelledAt || null,
    cancelledBy: item.CancelledBy || null,
    from: item.FromLocation || '',
    to: item.ToLocation || '',
    tyreQty: item.TyreQty || '',
    tyreSize: item.TyreSize || '',
    tyreCondition: item.TyreCondition || '',
    serviceType: item.ServiceType || '',
    brakeWork: item.BrakeWork || '',
    otherDesc: item.OtherDesc || '',
  };
}

async function dbGetBookings() {
  try {
    const res = await fetch('https://defaultf4bcffa889564651ac3884050ed2cf.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/c0b117808bec4f7a82d67d78f878a872/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=mtIALmc1npF25MYhNrMj-knE00tU5eJj6aStDdZTTII', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({action:'get'})
    });
    if (!res.ok) throw new Error('Get bookings failed: ' + res.status);
    const text = await res.text();
    // PA returns the array as a string, parse it
    let items;
    try { items = JSON.parse(text); } catch(e) { items = JSON.parse(JSON.parse(text)); }
    if (!Array.isArray(items)) throw new Error('Invalid response');
    const bookings = items.map(spToBooking).filter(b => b.status !== 'Deleted');
    localStorage.setItem('afs_bookings_v3', JSON.stringify(bookings));
    return bookings;
  } catch(e) {
    console.warn('Get bookings failed, using local cache:', e);
    return JSON.parse(localStorage.getItem('afs_bookings_v3') || '[]');
  }
}

async function dbSaveBooking(booking) {
  // Save locally immediately
  const bookings = JSON.parse(localStorage.getItem('afs_bookings_v3') || '[]');
  const idx = bookings.findIndex(b => b.ref === booking.ref);
  if (idx >= 0) bookings[idx] = booking; else bookings.push(booking);
  localStorage.setItem('afs_bookings_v3', JSON.stringify(bookings));
  // Update SharePoint via Power Automate flow
  try {
    await fetch('https://defaultf4bcffa889564651ac3884050ed2cf.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/0d9d269a1d3549ca9da496af62b5e0a3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=FYZusc_ZDk3VA_NIRKn2qo9qpUdnrMZjqPHM8ZGf7Dg', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bookingRef: booking.ref,
        status: booking.status || '',
        workshopNotes: booking.workshopNotes || '',
        acceptedAt: booking.acceptedAt || '',
        acceptedBy: booking.acceptedBy || '',
        completedAt: booking.completedAt || '',
        declinedAt: booking.declinedAt || '',
        cancelledAt: booking.cancelledAt || '',
        cancelledBy: booking.cancelledBy || ''
      })
    });
  } catch(e) { console.warn('Update booking failed:', e); }
}

async function dbDeleteBooking(ref) {
  const bookings = JSON.parse(localStorage.getItem('afs_bookings_v3') || '[]');
  const filtered = bookings.filter(b => b.ref !== ref);
  localStorage.setItem('afs_bookings_v3', JSON.stringify(filtered));

function calcMileageCost(miles) {
  const r = getRates();
  if (!miles || miles <= 0) return r.callout;
  const extra = Math.max(0, miles - r.freeMiles);
  return r.callout + (extra * r.perMile);
}

function formatCost(n) { return '£' + parseFloat(n||0).toFixed(2); }

function genRef(type) {
  const prefixes = {
    delivery:'DEL', collection:'COL', recovery:'REC',
    'prep-hire':'PRH', 'prep-offhire':'PRO', 'prep-sale':'PRS',
    'samsara-rem':'SREM', 'samsara-ins':'SINS',
    'livery-dpd':'LDPD', tyres:'TYR', service:'SVC',
    vhc:'VHC', brakes:'BRK', other:'OTH'
  };
  const p = prefixes[type] || 'BKG';
  const d = new Date();
  const ds = `${d.getDate().toString().padStart(2,'0')}${(d.getMonth()+1).toString().padStart(2,'0')}${String(d.getFullYear()).slice(2)}`;
  const rand = Math.floor(1000+Math.random()*9000);
  return `${p}-${ds}-${rand}`;
}

async function initNotifications() {
  if (!('serviceWorker' in navigator) || !('Notification' in window)) return;
  try {
    const reg = await navigator.serviceWorker.register('/afs-portal/sw.js', { scope: '/afs-portal/' });
    await navigator.serviceWorker.ready;
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return;
    const cfg = getCfg();
    // Use the hardcoded Get Bookings PA URL
    const paGetUrl = 'https://defaultf4bcffa889564651ac3884050ed2cf.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/c0b117808bec4f7a82d67d78f878a872/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=mtIALmc1npF25MYhNrMj-knE00tU5eJj6aStDdZTTII';
    const lastSeen = JSON.parse(localStorage.getItem('afs_sw_seen') || '[]');
    const sw = reg.active || reg.installing || reg.waiting;
    if (sw) {
      sw.postMessage({
        type: 'INIT',
        portalType: currentPortal,
        currentUser: currentUser,
        paGetUrl,
        lastSeenRefs: lastSeen
      });
    }
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data?.type === 'UPDATE_SEEN') {
        localStorage.setItem('afs_sw_seen', JSON.stringify(e.data.refs));
      }
    });
  } catch(err) {
    console.warn('SW registration failed:', err);
  }
}

function doLogout() {

    navigator.serviceWorker.controller.postMessage({ type: 'LOGOUT' });
  }
}

function buildNav() {
  const tabs = TABS[currentPortal];
  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = '';

  // Desktop nav
  tabs.forEach((t,i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (i===0?' active':'');
    btn.textContent = t.label;
    btn.onclick = () => showTab(t.id);
    btn.id = 'nav-' + t.id;
    nav.appendChild(btn);
  });

  // Mobile bottom nav
  const ICONS = {new:'➕', 'my-bookings':'📋', inbox:'📥', dispatch:'🚦', calendar:'📅', all:'📄', analytics:'📊', settings:'⚙️'};
  const LABELS = {new:'New', 'my-bookings':'Requests', inbox:'Inbox', dispatch:'Dispatch', calendar:'Calendar', all:'All', analytics:'Analytics', settings:'Settings'};
  const bottomNav = document.getElementById('bottom-nav-items');
  bottomNav.innerHTML = '';
  tabs.forEach((t,i) => {
    const btn = document.createElement('button');
    btn.className = 'bottom-nav-item' + (i===0?' active':'');
    btn.innerHTML = `<span>${ICONS[t.id]||'📋'}</span><span>${LABELS[t.id]||t.label}</span>`;
    btn.onclick = () => showTab(t.id);
    btn.id = 'bottom-nav-' + t.id;
    bottomNav.appendChild(btn);
  });

  showTab(tabs[0].id);
}

async function showTab(id) {
  activeTab = id;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(t=>t.classList.remove('active'));
  const navEl = document.getElementById('nav-'+id);
  if (navEl) navEl.classList.add('active');
  const bottomEl = document.getElementById('bottom-nav-'+id);
  if (bottomEl) bottomEl.classList.add('active');
  const pc = document.getElementById('page-content');
  pc.innerHTML = '';

  if (currentPortal === 'logistics') {
    if (id==='new') { pc.appendChild(renderNewBooking()); return; }
    if (id==='settings') { pc.appendChild(renderSettings()); return; }
  } else {
    if (id==='settings') { pc.appendChild(renderSettings()); return; }
  }

  // Show loading spinner for data pages
  pc.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);font-size:14px;"><span class="spin" style="border-color:var(--border-light);border-top-color:var(--navy);width:24px;height:24px;"></span><div style="margin-top:12px;">Loading bookings...</div></div>';

  // Load fresh data from shared DB
  const bookings = await dbGetBookings();

  pc.innerHTML = '';
  if (currentPortal === 'logistics') {
    if (id==='my-bookings') pc.appendChild(renderMyBookings(bookings));
    if (id==='calendar') pc.appendChild(renderCalendar(bookings));
    if (id==='analytics') pc.appendChild(renderAnalytics('logistics', bookings));
  } else {
    if (id==='inbox') pc.appendChild(renderInbox(bookings));
    if (id==='dispatch') pc.appendChild(renderDispatch(bookings));
    if (id==='calendar') pc.appendChild(renderCalendar(bookings));
    if (id==='all') pc.appendChild(renderAllBookings(bookings));
    if (id==='analytics') pc.appendChild(renderAnalytics('workshop', bookings));
  }
}

function calcBrakeCost() {
  const fpEl = document.querySelector('#vf-brakes input[value="fp"]');
  const rpEl = document.querySelector('#vf-brakes input[value="rp"]');
  const fdEl = document.querySelector('#vf-brakes input[value="fd"]');
  const rdEl = document.querySelector('#vf-brakes input[value="rd"]');

  const fd = fdEl?.checked;
  const rd = rdEl?.checked;

  // Discs include pads — disable pad on same axle
  if (fpEl) { if(fd){fpEl.checked=false;fpEl.disabled=true;}else{fpEl.disabled=false;} }
  if (rpEl) { if(rd){rpEl.checked=false;rpEl.disabled=true;}else{rpEl.disabled=false;} }

  // No cross-axle mixing: if any discs selected, disable pads on other axle too
  if (fd || rd) {
    if (fpEl && !fd) { fpEl.checked=false; fpEl.disabled=true; }
    if (rpEl && !rd) { rpEl.checked=false; rpEl.disabled=true; }
  } else {
    if (fpEl) fpEl.disabled=false;
    if (rpEl) rpEl.disabled=false;
  }

  const fp = fpEl?.checked;
  const rp = rpEl?.checked;

  let cost = 0; const parts = [];

  if (fp && rp)   { cost = 175; parts.push('Front & rear pads £175'); }
  else if (fp)    { cost = 100; parts.push('Front pads £100'); }
  else if (rp)    { cost = 100; parts.push('Rear pads £100'); }

  if (fd && rd)   { cost += 450; parts.push('Front & rear discs & pads £450'); }
  else if (fd)    { cost += 275; parts.push('Front discs & pads £275'); }
  else if (rd)    { cost += 275; parts.push('Rear discs & pads £275'); }

  calcCost = cost;
  const summary = document.getElementById('brake-summary');
  if (parts.length > 0) {
    summary.style.display = 'block';
    summary.innerHTML = `🛑 ${parts.join(' + ')} = <strong>${formatCost(cost)}</strong> estimated`;
    showCostPanel(formatCost(cost), parts.join(' + '));
  } else {
    summary.style.display = 'none';
    document.getElementById('nb-cost-panel').style.display = 'none';
    calcCost = 0;
  }
}

function showCostPanel(val, basis) {
  const panel = document.getElementById('nb-cost-panel');
  if (!panel) return;
  panel.style.display = 'flex';
  document.getElementById('nb-cost-num').textContent = val.replace('£','');
  document.getElementById('nb-cost-basis').textContent = basis;
  calcCost = parseFloat(val.replace('£',''))||0;
}

async function lookupDistance() {
  const from = document.getElementById('pc-from').value.trim().replace(/\s+/g,'').toUpperCase();
  const to   = document.getElementById('pc-to').value.trim().replace(/\s+/g,'').toUpperCase();
  if (!from || !to) { alert('Please enter both postcodes.'); return; }
  const res = document.getElementById('mileage-result');
  res.className = 'mileage-result show';
  res.innerHTML = '<span><span class="spin"></span> Calculating distance...</span>';
  try {
    const url = `https://api.distancematrix.ai/maps/api/distancematrix/json?origins=${from}&destinations=${to}&key=FREE_TIER`;
    // Fallback: use postcodes.io for lat/lng then haversine
    const fromR = await fetch(`https://api.postcodes.io/postcodes/${from}`);
    const toR   = await fetch(`https://api.postcodes.io/postcodes/${to}`);
    const fromD = await fromR.json();
    const toD   = await toR.json();
    if (fromD.status !== 200 || toD.status !== 200) throw new Error('Invalid postcode');
    const miles = haversine(fromD.result.latitude, fromD.result.longitude, toD.result.latitude, toD.result.longitude);
    const oneway = Math.round(miles);
    calcMiles = oneway * 2; // return journey
    const cost = calcMileageCost(calcMiles);
    calcCost = cost;
    const extra = Math.max(0, calcMiles - FREE_MILES);
    const breakdown = `${oneway} miles each way × 2 (return) = ${calcMiles} miles — £${CALLOUT} callout + ${Math.max(0,calcMiles-FREE_MILES)} miles × £${PER_MILE} = ${formatCost(cost)}`;
    res.innerHTML = `<div><div style="font-weight:700;font-size:14px;color:var(--navy);">${oneway} miles each way (${calcMiles} miles return)</div><div class="mileage-breakdown">${breakdown}</div></div><div style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--accent);">${formatCost(cost)}</div>`;
    showCostPanel(formatCost(cost), `${oneway} mi each way × 2 = ${calcMiles} mi return — postcodes ${from} → ${to}`);
    document.getElementById('manual-miles').value = '';
  } catch(e) {
    res.innerHTML = `<span style="color:var(--red);">⚠ Couldn't look up those postcodes. Please enter miles manually below.</span>`;
  }
}

function haversine(lat1,lon1,lat2,lon2) {
  const R=3958.8, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function onManualMiles() {
  const m = parseFloat(document.getElementById('manual-miles').value);
  if (isNaN(m) || m < 0) return;
  const oneway = Math.round(m);
  calcMiles = oneway * 2; // return journey
  calcCost = calcMileageCost(calcMiles);
  const extra = Math.max(0, calcMiles - FREE_MILES);
  const basis = `${oneway} miles × 2 (return) = ${calcMiles} miles total`;
  showCostPanel(formatCost(calcCost), basis);
  const res = document.getElementById('mileage-result');
  if (res) { res.className='mileage-result show'; res.innerHTML=`<div><div style="font-weight:700;">Manual entry: ${oneway} miles each way (${calcMiles} miles return)</div></div><div style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--accent);">${formatCost(calcCost)}</div>`; }
}

async function filterMyBookings() {
  const sf = document.getElementById('mf-status')?.value;
  const tf = document.getElementById('mf-type')?.value;
  const q  = document.getElementById('mf-search')?.value?.toLowerCase();
  const all = await dbGetBookings();
  const bookings = all.filter(b=>{
    if (sf && b.status !== sf) return false;
    if (tf && b.type !== tf) return false;
    if (q && !`${b.ref} ${b.reg} ${b.typeLabel} ${b.raisedBy}`.toLowerCase().includes(q)) return false;
    return true;
  }).reverse();
  document.getElementById('mb-table').innerHTML = renderBookingTable(bookings,'logistics');
}

          ${getJobTypes().map(j=>`<option value="${j.id}">${j.label}</option>`).join('')}
        </select>
        <select id="af-charge" onchange="filterAll()">
          <option value="">All charge entities</option>
          <option>AFS Logistics</option><option>AFS Repair</option><option>Blameless Claims</option>
          <option>AFS Leasing</option><option>Third Party / Insurance</option><option>Customer Direct</option>
        </select>
        <input type="text" id="af-search" placeholder="Search ref, reg, staff..." oninput="filterAll()" />
      </div>
      <div class="table-wrap" id="all-table">${renderBookingTable(bookings,'workshop')}</div>
    </div>`;
  return div;
}

async function filterAll() {
  const sf = document.getElementById('af-status')?.value;
  const tf = document.getElementById('af-type')?.value;
  const cf = document.getElementById('af-charge')?.value;
  const q  = document.getElementById('af-search')?.value?.toLowerCase();
  const all = await dbGetBookings();
  const bookings = all.filter(b=>{
    if (sf && b.status !== sf) return false;
    if (tf && b.type !== tf) return false;
    if (cf && b.chargeTo !== cf) return false;
    if (q && !`${b.ref} ${b.reg} ${b.raisedBy} ${b.typeLabel}`.toLowerCase().includes(q)) return false;
    return true;
  }).reverse();
  const el = document.getElementById('all-table');
  if (el) el.innerHTML = renderBookingTable(bookings,'workshop');
}

async function deleteBooking(ref) {
  if (!confirm(`Permanently delete booking ${ref}?\n\nThis cannot be undone.`)) return;
  await dbDeleteBooking(ref);
  closeModal();
  setTimeout(() => showTab(activeTab), 2000);
}

function confirmCancel(ref) {
  const b = getBookings().find(x=>x.ref===ref);
  if (!b) return;
  const msg = b.status === 'Accepted'
    ? `Cancel accepted booking ${ref}?\n\nThis will notify the raiser and the workshop. Are you sure?`
    : `Cancel booking ${ref}?\n\nAre you sure?`;
  if (confirm(msg)) { updateBookingStatus(ref, 'Cancelled'); }
}

function closeModal() { document.getElementById('detail-overlay').classList.remove('show'); }

async function updateBookingStatus(ref, status) {
  saveWorkshopNotes(ref, false);
  const bookings = getBookings();
  const b = bookings.find(x=>x.ref===ref);
  if (!b) return;
  b.status = status;
  if (status==='Accepted') { b.acceptedAt=ts(); b.acceptedBy=currentUser; }
  if (status==='Completed') { b.completedAt=ts(); }
  if (status==='Declined') { b.declinedAt=ts(); }
  if (status==='Cancelled') { b.cancelledAt=ts(); b.cancelledBy=currentUser; }
  await dbSaveBooking(b);
  // Fire Power Automate status update email to raiser
  fireStatusEmail(b, status);
  closeModal();
  // Wait briefly for PA flow to update SP, then reload fresh from DB
  setTimeout(() => showTab(activeTab), 2000);
}

async function saveWorkshopNotes(ref, showFeedback=true) {
  const notes = document.getElementById('ws-notes')?.value;
  if (notes === undefined) return;
  const bookings = getBookings();
  const b = bookings.find(x=>x.ref===ref);
  if (b) { b.workshopNotes = notes; saveBookings(bookings); await dbSaveBooking(b); }
  if (showFeedback) { closeModal(); setTimeout(() => showTab(activeTab), 2000); }
}

let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function renderCalendar(bookings) {
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="page-header">
      <h1>Calendar</h1>
      <p>Bookings by required date</p>
    </div>
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="calNav(-1)">← Prev</button>
        <div class="cal-month-label" id="cal-month-label"></div>
        <button class="cal-nav-btn" onclick="calNav(1)">Next →</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-day-panel" id="cal-day-panel">
        <div class="cal-day-panel-header">
          <span id="cal-panel-date"></span>
          <button class="cal-nav-btn" onclick="document.getElementById('cal-day-panel').classList.remove('show')">✕ Close</button>
        </div>
        <div id="cal-panel-content"></div>
      </div>
    </div>`;
  // Store bookings on window for cal navigation
  window._calBookings = bookings;
  setTimeout(() => drawCalendar(), 0);
  return div;
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  drawCalendar();
}

function drawCalendar() {
  const bookings = window._calBookings || [];
  const label = document.getElementById('cal-month-label');
  const grid  = document.getElementById('cal-grid');
  if (!label || !grid) return;

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  label.textContent = `${monthNames[calMonth]} ${calYear}`;

  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const startOffset = (firstDay + 6) % 7; // Monday start

  // Build lookup: dateStr → bookings
  const byDate = {};
  bookings.forEach(b => {
    if (!b.dateRequired) return;
    const key = b.dateRequired; // YYYY-MM-DD
    if (!byDate[key]) byDate[key] = [];
    byDate[key].push(b);
  });

  const CHIP_CLASS = {Pending:'cal-chip-pending',Accepted:'cal-chip-accepted',Completed:'cal-chip-completed',Declined:'cal-chip-declined',Cancelled:'cal-chip-cancelled'};

  let html = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cal-dow">${d}</div>`).join('');

  // Empty cells before month start
  for (let i=0;i<startOffset;i++) html += `<div class="cal-day other-month"></div>`;

  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const dayBookings = byDate[dateStr] || [];
    const hasBookings = dayBookings.length > 0;
    const visible = dayBookings.slice(0,3);
    const overflow = dayBookings.length - visible.length;

    html += `<div class="cal-day${isToday?' today':''}${hasBookings?' has-bookings':''}" onclick="openCalDay('${dateStr}')">
      <div class="cal-day-num">${d}</div>
      ${visible.map(b=>`<span class="cal-chip ${CHIP_CLASS[b.status]||'cal-chip-pending'}" title="${b.typeLabel} — ${b.reg}">${b.reg||b.typeLabel}</span>`).join('')}
      ${overflow>0?`<div class="cal-more">+${overflow} more</div>`:''}
    </div>`;
  }

  grid.innerHTML = html;
}

function openCalDay(dateStr) {
  const bookings = (window._calBookings||[]).filter(b=>b.dateRequired===dateStr);
  const panel = document.getElementById('cal-day-panel');
  const panelDate = document.getElementById('cal-panel-date');

        <th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);border-bottom:2px solid var(--border-light);">Reg</th>

        <th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);border-bottom:2px solid var(--border-light);">Priority</th>
        <th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);border-bottom:2px solid var(--border-light);">Status</th>
        <th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);border-bottom:2px solid var(--border-light);">Raised by</th>
        <th style="padding:8px 10px;border-bottom:2px solid var(--border-light);"></th>
      </tr></thead>
      <tbody>
        ${bookings.map(b=>`<tr>
          <td data-label="Ref" style="padding:10px;"><span class="ref-badge">${b.ref}</span></td>
          <td data-label="Job" style="padding:10px;"><span class="tag tag-type" style="font-size:11px;">${b.typeLabel}</span></td>
          <td data-label="Reg" style="padding:10px;font-weight:700;">${b.reg||'—'}</td>

          <td data-label="Priority" style="padding:10px;font-size:12px;font-weight:600;color:${b.priority==='ASAP'?'var(--red)':b.priority==='Urgent'?'var(--amber)':'var(--muted)'};">${b.priority}</td>
          <td data-label="Status" style="padding:10px;"><span class="tag ${CHIP_CLASS[b.status]||'tag-pending'}">${b.status}</span></td>
          <td data-label="Raised by" style="padding:10px;font-size:12px;">${b.raisedBy||'—'}</td>
          <td style="padding:10px;"><button class="btn btn-ghost btn-sm" onclick="openBookingDetail('${b.ref}')">View</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});

// DISPATCH BOARD
// ═══════════════════════════════════════════════
let dispatchDate = new Date().toISOString().split('T')[0];

function renderDispatch(bookings) {
  window._dispatchBookings = bookings;
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="page-header">
      <h1>Dispatch Board</h1>
      <p>Jobs by date — manage, accept and complete</p>
    </div>
    <div id="dispatch-inner"></div>
  `;
  setTimeout(() => drawDispatch(), 0);
  return div;
}

function drawDispatch() {
  const bookings = window._dispatchBookings || [];
  const filtered = bookings.filter(b =>
    b.dateRequired === dispatchDate &&
    b.status !== 'Cancelled' && b.status !== 'Declined' && b.status !== 'Deleted'
  );
  filtered.sort((a,b) => (a.timeRequired||'23:59').localeCompare(b.timeRequired||'23:59'));

  const pending   = filtered.filter(b=>b.status==='Pending').length;
  const accepted  = filtered.filter(b=>b.status==='Accepted').length;
  const completed = filtered.filter(b=>b.status==='Completed').length;

  const isToday = dispatchDate === new Date().toISOString().split('T')[0];
  const dateLabel = new Date(dispatchDate+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const inner = document.getElementById('dispatch-inner');
  if (!inner) return;
  inner.innerHTML = `
    <div class="dispatch-header">
      <div>
        <div class="dispatch-date">${isToday ? 'Today' : dateLabel}</div>
        ${!isToday?`<div class="dispatch-count">${dateLabel}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="cal-nav-btn" onclick="shiftDispatchDate(-1)">← Prev</button>
        <input type="date" value="${dispatchDate}" onchange="changeDispatchDate(this.value)"
          style="background:var(--white);border:1.5px solid var(--border-light);border-radius:6px;padding:7px 12px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--navy);outline:none;cursor:pointer;" />
        <button class="cal-nav-btn" onclick="shiftDispatchDate(1)">Next →</button>
        ${!isToday?`<button class="cal-nav-btn" onclick="changeDispatchDate('${new Date().toISOString().split('T')[0]}')">Today</button>`:''}
      </div>
    </div>

    <div class="stats-grid dispatch-stats" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px;">
      <div class="stat-card s-navy">
        <div class="stat-label">Total</div>
        <div class="stat-value">${filtered.length}</div>
        <div class="stat-sub">jobs scheduled</div>
      </div>
      <div class="stat-card s-amber">
        <div class="stat-label">Pending</div>
        <div class="stat-value">${pending}</div>
        <div class="stat-sub">awaiting acceptance</div>
      </div>
      <div class="stat-card s-red">
        <div class="stat-label">In progress</div>
        <div class="stat-value">${accepted}</div>
        <div class="stat-sub">accepted &amp; active</div>
      </div>
      <div class="stat-card s-green">
        <div class="stat-label">Completed</div>
        <div class="stat-value">${completed}</div>
        <div class="stat-sub">done</div>
      </div>
    </div>

    ${filtered.length === 0 ? `
      <div class="card">
        <div class="dispatch-empty">
          <span class="dispatch-empty-icon">🚦</span>
          <p style="font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px;">No jobs scheduled for this date</p>
          <p style="font-size:13px;">Use the arrows or date picker to navigate, or check the Calendar view.</p>
        </div>
      </div>
    ` : `
      <div class="dispatch-grid" id="dispatch-grid">
        ${filtered.map(b => renderDispatchCard(b)).join('')}
      </div>
    `}
  `;
}

function shiftDispatchDate(dir) {
  const d = new Date(dispatchDate+'T12:00:00');
  d.setDate(d.getDate() + dir);
  dispatchDate = d.toISOString().split('T')[0];
  drawDispatch();
}

function changeDispatchDate(val) {
  dispatchDate = val;
  drawDispatch();
}

function renderDispatchCard(b) {
  const priorityColor = b.priority==='ASAP'?'var(--red)':b.priority==='Urgent'?'var(--amber)':'var(--muted)';
  const statusBorderColor = {Pending:'var(--amber)',Accepted:'var(--navy)',Completed:'var(--green)',Declined:'var(--red)',Cancelled:'#aaa'}[b.status]||'var(--border-light)';
  const STATUS_CLASS = {Pending:'tag-pending',Accepted:'tag-accepted',Completed:'tag-completed',Declined:'tag-declined',Cancelled:'tag-cancelled'};

  const actions = b.status === 'Pending' ? `
    <button class="btn btn-green btn-sm" onclick="dispatchAction('${b.ref}','Accepted')">✓ Accept</button>
    <button class="btn btn-red btn-sm" onclick="dispatchAction('${b.ref}','Declined')">✕ Decline</button>
    <button class="btn btn-ghost btn-sm" onclick="openBookingDetail('${b.ref}')">Detail</button>
    <button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="saveDispatchNotes('${b.ref}')">Save</button>
  ` : b.status === 'Accepted' ? `
    <button class="btn btn-navy btn-sm" onclick="dispatchAction('${b.ref}','Completed')">✓ Complete</button>
    <button class="btn btn-ghost btn-sm" onclick="openBookingDetail('${b.ref}')">Detail</button>
    <button class="btn btn-sm" style="background:#f0f0f5;color:#555;border:1px solid #ccc;font-size:11px;padding:6px 10px;" onclick="dispatchConfirmCancel('${b.ref}')">Cancel</button>
    <button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="saveDispatchNotes('${b.ref}')">Save</button>
  ` : `
    <button class="btn btn-ghost btn-sm" onclick="openBookingDetail('${b.ref}')">View</button>
    <button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="saveDispatchNotes('${b.ref}')">Save</button>
  `;

  return `<div class="dispatch-card" style="border-left:4px solid ${statusBorderColor};" id="dcard-${b.ref}">
    <!-- Header: ref + time + priority + status -->
    <div class="dispatch-card-header" style="padding:10px 14px;">
      <span class="dispatch-card-ref" style="font-size:11px;padding:3px 7px;">${b.ref}</span>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
        ${b.timeRequired?`<span style="font-size:11px;font-weight:700;color:var(--navy);">🕐 ${b.timeRequired}</span>`:''}
        <span style="font-size:11px;font-weight:700;color:${priorityColor};">${b.priority}</span>
        <span class="tag ${STATUS_CLASS[b.status]||'tag-pending'}" style="font-size:10px;">${b.status}</span>
      </div>
    </div>
    <!-- Body: reg + make, then 2-col meta -->
    <div style="padding:10px 14px;">
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px;">
        <span style="font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--navy);letter-spacing:0.05em;">${b.reg||'—'}</span>
        <span style="font-size:12px;color:var(--muted);">${b.make||''}</span>
        <span style="margin-left:auto;font-size:13px;font-weight:800;color:var(--navy);">${formatCost(b.cost)}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;">
        <div style="background:var(--offwhite);border-radius:5px;padding:6px 8px;">
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);">Job type</div>
          <div style="font-size:12px;font-weight:700;color:var(--navy);margin-top:1px;">${b.typeLabel}</div>
        </div>
        <div style="background:var(--offwhite);border-radius:5px;padding:6px 8px;">
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);">Charge to</div>
          <div style="font-size:11px;font-weight:700;color:var(--navy);margin-top:1px;">${b.chargeTo||'—'}</div>
        </div>
        ${b.from?`<div style="background:var(--offwhite);border-radius:5px;padding:6px 8px;"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);">From</div><div style="font-size:11px;font-weight:700;color:var(--navy);margin-top:1px;">${b.from}</div></div>`:''}
        ${b.to?`<div style="background:var(--offwhite);border-radius:5px;padding:6px 8px;"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);">To</div><div style="font-size:11px;font-weight:700;color:var(--navy);margin-top:1px;">${b.to}</div></div>`:''}
      </div>
      ${b.notes?`<div style="background:var(--offwhite);border-radius:5px;padding:7px 9px;font-size:12px;color:var(--navy);margin-bottom:8px;"><span style="font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);">Notes: </span>${b.notes}</div>`:''}
      <textarea class="dispatch-notes-input" id="dnotes-${b.ref}" placeholder="Workshop notes..." rows="1" style="min-height:36px;">${b.workshopNotes||''}</textarea>
    </div>
    ${b.status==='Completed'?`<div style="padding:8px 14px;background:var(--green-light);"><span style="font-size:11px;font-weight:700;color:var(--green);">✓ Completed${b.completedAt?' — '+b.completedAt:''}</span></div>`:''}
    <div style="padding:8px 14px;border-top:1px solid var(--border-light);display:flex;gap:6px;align-items:center;flex-wrap:nowrap;">
      ${actions}
    </div>
  </div>`;
}

async function dispatchAction(ref, status) {
  const bookings = getBookings();
  const b = bookings.find(x=>x.ref===ref);
  if (!b) return;
  b.status = status;
  if (status==='Accepted')  { b.acceptedAt=ts(); b.acceptedBy=currentUser; }
  if (status==='Completed') { b.completedAt=ts(); }
  if (status==='Declined')  { b.declinedAt=ts(); }
  await dbSaveBooking(b);
  fireStatusEmail(b, status);
  // Re-render just the card
  const card = document.getElementById('dcard-'+ref);
  if (card) card.outerHTML = renderDispatchCard(b);
  // Also refresh the window bookings cache so calendar stays in sync
  const all = JSON.parse(localStorage.getItem('afs_bookings_v3')||'[]');
  window._calBookings = all;
}

function dispatchConfirmCancel(ref) {
  if (confirm(`Cancel booking ${ref}?`)) dispatchAction(ref, 'Cancelled');
}

async function saveDispatchNotes(ref) {
  const notes = document.getElementById('dnotes-'+ref)?.value;
  if (notes === undefined) return;
  const bookings = getBookings();
  const b = bookings.find(x=>x.ref===ref);
  if (!b) return;
  b.workshopNotes = notes;
  saveBookings(bookings);
  await dbSaveBooking(b);
  const btn = event.target;
  btn.textContent = '✓ Saved';
  setTimeout(()=>btn.textContent='Save notes', 2000);
}

let analyticsFrom = '';
let analyticsTo   = '';

function renderAnalytics(side, bookings) {
  if (!analyticsFrom) {
    const d = new Date(); d.setDate(d.getDate()-90);
    analyticsFrom = d.toISOString().split('T')[0];
  }
  if (!analyticsTo) analyticsTo = new Date().toISOString().split('T')[0];
  window._analyticsAllBookings = bookings;
  window._analyticsSide = side;
  const div = document.createElement('div');
  div.innerHTML = `
    <div class="page-header">
      <h1>Analytics</h1>
      <p>Performance metrics and spend analysis</p>
    </div>
    <div class="card" style="margin-bottom:20px;">
      <div style="display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap;">
        <div style="display:flex;align-items:flex-end;gap:8px;flex:1;min-width:0;">
          <div class="field" style="margin:0;flex:1;min-width:0;">
            <label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy);opacity:0.7;display:block;margin-bottom:4px;">From</label>
            <input type="date" id="an-from" value="${analyticsFrom}" onchange="refreshAnalytics()"
              style="width:100%;background:var(--offwhite);border:1.5px solid var(--border-light);color:var(--text);font-family:var(--font);font-size:13px;padding:7px 10px;border-radius:6px;outline:none;" />
          </div>
          <div class="field" style="margin:0;flex:1;min-width:0;">
            <label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy);opacity:0.7;display:block;margin-bottom:4px;">To</label>
            <input type="date" id="an-to" value="${analyticsTo}" onchange="refreshAnalytics()"
              style="width:100%;background:var(--offwhite);border:1.5px solid var(--border-light);color:var(--text);font-family:var(--font);font-size:13px;padding:7px 10px;border-radius:6px;outline:none;" />
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          ${[{l:'MTD',d:'mtd'},{l:'30d',d:30},{l:'90d',d:90},{l:'+30d',d:'next30'},{l:'Year',d:365},{l:'All',d:0}].map(p=>`
            <button class="btn btn-ghost btn-sm" style="padding:7px 10px;font-size:11px;" onclick="setAnalyticsPreset('${p.d}')">${p.l}</button>
          `).join('')}
        </div>
      </div>
    </div>
    <div id="analytics-body"></div>
  `;
  setTimeout(() => drawAnalytics(), 0);
  return div;
}

function setAnalyticsPreset(preset) {
  const now = new Date();
  analyticsTo = now.toISOString().split('T')[0];
  if (preset === 'mtd') {
    analyticsFrom = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  } else if (preset === 'next30') {
    analyticsFrom = analyticsTo;
    const future = new Date(); future.setDate(future.getDate()+30);
    analyticsTo = future.toISOString().split('T')[0];
  } else if (preset === 0 || preset === '0') {
    analyticsFrom = '2020-01-01';
  } else {
    const f = new Date(); f.setDate(f.getDate() - parseInt(preset));
    analyticsFrom = f.toISOString().split('T')[0];
  }
  document.getElementById('an-from').value = analyticsFrom;
  document.getElementById('an-to').value   = analyticsTo;
  drawAnalytics();
}

function refreshAnalytics() {
  analyticsFrom = document.getElementById('an-from').value;
  analyticsTo   = document.getElementById('an-to').value;
  drawAnalytics();
}

function drawAnalytics() {
  const allBookings = window._analyticsAllBookings || [];
  const from = new Date(analyticsFrom+'T00:00:00');
  const to   = new Date(analyticsTo+'T23:59:59');
  const bookings = allBookings.filter(b => {
    if (!b.dateRequired) return false;
    const d = new Date(b.dateRequired+'T12:00:00');
    return d >= from && d <= to;
  });
  const body = document.getElementById('analytics-body');
  if (!body) return;
  const COLORS = ['#e8312a','#0d1f3c','#f5a623','#00a86b','#2a4a7f','#ff5c56','#152a4e','#007a50','#1e3660','#b57a00'];
  const activeB = bookings.filter(b=>b.status!=='Cancelled'&&b.status!=='Declined'&&b.status!=='Deleted');
  const total=bookings.length, completed=bookings.filter(b=>b.status==='Completed').length;
  const declined=bookings.filter(b=>b.status==='Declined').length, cancelled=bookings.filter(b=>b.status==='Cancelled').length;
  const totalSpend=activeB.reduce((s,b)=>s+parseFloat(b.cost||0),0);
  const responded=bookings.filter(b=>b.status!=='Pending').length;
  const acceptRate=responded>0?Math.round(bookings.filter(b=>b.acceptedAt).length/responded*100):null;
  const resolved=completed+declined+cancelled;
  const completionRate=resolved>0?Math.round(completed/resolved*100):null;
  const responseTimes=bookings.filter(b=>b.acceptedAt&&b.submittedAt).map(b=>(parseDate(b.acceptedAt)-parseDate(b.submittedAt))/60000);
  const avgResponse=responseTimes.length?Math.round(responseTimes.reduce((a,b)=>a+b,0)/responseTimes.length):null;
  const completionTimes=bookings.filter(b=>b.acceptedAt&&b.completedAt).map(b=>(parseDate(b.completedAt)-parseDate(b.acceptedAt))/3600000);
  const avgCompletion=completionTimes.length?(completionTimes.reduce((a,b)=>a+b,0)/completionTimes.length).toFixed(1):null;
  const priCount={ASAP:0,Urgent:0,Standard:0};
  bookings.forEach(b=>{if(priCount[b.priority]!==undefined)priCount[b.priority]++;});
  // Monthly buckets
  const monthBuckets={};
  allBookings.filter(b=>b.dateRequired).forEach(b=>{
    const d=new Date(b.dateRequired+'T12:00:00');
    if(d<from||d>to)return;
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(!monthBuckets[key])monthBuckets[key]={count:0,spend:0,label:d.toLocaleString('en-GB',{month:'short',year:'2-digit'})};
    monthBuckets[key].count++;
    if(b.status!=='Cancelled'&&b.status!=='Declined')monthBuckets[key].spend+=parseFloat(b.cost||0);
  });
  const monthKeys=Object.keys(monthBuckets).sort();
  const maxMonthSpend=Math.max(...monthKeys.map(k=>monthBuckets[k].spend),1);
  // Job types — include legacy types not in current JOB_TYPES
  const typeCount={},typeCost={},typeLabel={};
  getJobTypes().forEach(j=>{ typeCount[j.id]=0; typeCost[j.id]=0; typeLabel[j.id]=j.label; });
  bookings.forEach(b=>{
    const id = b.type||'unknown';
    if(!typeCount[id]){ typeCount[id]=0; typeCost[id]=0; typeLabel[id]=b.typeLabel||id; }
    typeCount[id]++;
    if(b.status!=='Cancelled'&&b.status!=='Declined') typeCost[id]=(typeCost[id]||0)+parseFloat(b.cost||0);
  });
  const typesSorted=Object.keys(typeCount).filter(id=>typeCount[id]>0).map(id=>({id,label:typeLabel[id],count:typeCount[id],cost:typeCost[id]})).sort((a,b)=>b.cost-a.cost);
  const maxTypeCost=Math.max(...typesSorted.map(j=>j.cost),1);
  const maxTypeCount=Math.max(...typesSorted.map(j=>j.count),1);
  // Charge entity
  const chargeSpend={},chargeCount={};
  activeB.forEach(b=>{const k=b.chargeTo||'Unknown';chargeSpend[k]=(chargeSpend[k]||0)+parseFloat(b.cost||0);chargeCount[k]=(chargeCount[k]||0)+1;});
  const chargeEntries=Object.entries(chargeSpend).sort((a,b)=>b[1]-a[1]);
  const maxCharge=Math.max(...chargeEntries.map(e=>e[1]),1);
  // Staff
  const staffData=STAFF.logistics.map(name=>({name,count:bookings.filter(b=>b.raisedBy===name).length,spend:activeB.filter(b=>b.raisedBy===name).reduce((s,b)=>s+parseFloat(b.cost||0),0)})).filter(s=>s.count>0).sort((a,b)=>b.spend-a.spend);
  const maxStaffSpend=Math.max(...staffData.map(s=>s.spend),1);

  body.innerHTML = `
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">
      <div class="stat-card s-navy"><div class="stat-label">Total bookings</div><div class="stat-value">${total}</div><div class="stat-sub">in selected period</div></div>
      <div class="stat-card s-red"><div class="stat-label">Total spend</div><div class="stat-value" style="font-size:26px;">${formatCost(totalSpend)}</div><div class="stat-sub">exc. cancelled &amp; declined</div></div>
      <div class="stat-card s-green"><div class="stat-label">Completion rate</div><div class="stat-value">${completionRate!==null?completionRate+'%':'—'}</div><div class="stat-sub">${completed} completed of ${resolved} resolved</div></div>
      <div class="stat-card s-amber"><div class="stat-label">Acceptance rate</div><div class="stat-value">${acceptRate!==null?acceptRate+'%':'—'}</div><div class="stat-sub">${responded} bookings responded to</div></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="card-title-accent"></span>Operational performance</div>
      <div class="perf-grid">
        <div class="perf-card"><div class="perf-card-label">⏱ Avg response time</div><div class="perf-card-value">${avgResponse!==null?avgResponse+'m':'—'}</div><div class="perf-card-sub">Submission → Acceptance (${responseTimes.length} bookings)</div></div>
        <div class="perf-card"><div class="perf-card-label">✅ Avg completion time</div><div class="perf-card-value">${avgCompletion!==null?avgCompletion+'h':'—'}</div><div class="perf-card-sub">Accepted → Completed (${completionTimes.length} bookings)</div></div>
        <div class="perf-card"><div class="perf-card-label">💷 Avg cost per booking</div><div class="perf-card-value">${total>0?formatCost(totalSpend/total):'—'}</div><div class="perf-card-sub">Across all active bookings</div></div>
        <div class="perf-card"><div class="perf-card-label">🚨 ASAP / Urgent</div><div class="perf-card-value">${priCount.ASAP+priCount.Urgent}</div><div class="perf-card-sub">${priCount.ASAP} ASAP · ${priCount.Urgent} Urgent · ${priCount.Standard} Standard</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span class="card-title-accent"></span>Spend over time</div>
      ${monthKeys.length===0?'<div style="color:var(--muted);font-size:13px;padding:12px 0;">No data in this range.</div>':
      `<div style="overflow-x:auto;"><div style="min-width:${Math.max(monthKeys.length*72,300)}px;">
        <div style="display:flex;align-items:flex-end;gap:4px;height:140px;margin-bottom:4px;padding:0 2px;">
          ${monthKeys.map(k=>{
            const pct=Math.round(monthBuckets[k].spend/maxMonthSpend*100);
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:2px;">
              <div style="font-size:9px;font-weight:700;color:var(--navy);white-space:nowrap;">${formatCost(monthBuckets[k].spend)}</div>
              <div style="width:100%;background:var(--accent);border-radius:3px 3px 0 0;height:${Math.max(pct,2)}%;"></div>
            </div>`;}).join('')}
        </div>
        <div style="display:flex;gap:4px;padding:0 2px;margin-bottom:3px;">
          ${monthKeys.map(k=>`<div style="flex:1;text-align:center;font-size:9px;color:var(--muted);font-weight:600;">${monthBuckets[k].count}j</div>`).join('')}
        </div>
        <div style="display:flex;gap:4px;padding:0 2px;border-top:1px solid var(--border-light);padding-top:4px;">
          ${monthKeys.map(k=>`<div style="flex:1;text-align:center;font-size:10px;font-weight:700;color:var(--navy);">${monthBuckets[k].label}</div>`).join('')}
        </div>
      </div></div>
      <div style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--muted);">
        <span><span style="display:inline-block;width:10px;height:10px;background:var(--accent);border-radius:2px;margin-right:4px;vertical-align:middle;"></span>Spend (£)</span>
        <span>Numbers below bars = job count (j)</span>
      </div>`}
    </div>

    <div class="charts-grid">
      <div class="card">
        <div class="card-title"><span class="card-title-accent"></span>Spend by job type</div>
        <div class="chart-bar-wrap">
          ${typesSorted.length?typesSorted.map((j,i)=>`<div class="chart-bar-row">
            <div class="chart-bar-label">${j.label}</div>
            <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.round(j.cost/maxTypeCost*100)}%;background:${COLORS[i%COLORS.length]};"><span>${formatCost(j.cost)}</span></div></div>
            <div class="chart-bar-val" style="font-size:11px;">${j.count} jobs</div>
          </div>`).join(''):'<div style="color:var(--muted);font-size:13px;">No data.</div>'}
        </div>
      </div>
      <div class="card">
        <div class="card-title"><span class="card-title-accent"></span>Volume by job type</div>
        <div class="chart-bar-wrap">
          ${typesSorted.length?typesSorted.map((j,i)=>`<div class="chart-bar-row">
            <div class="chart-bar-label">${j.label}</div>
            <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${Math.round(j.count/maxTypeCount*100)}%;background:${COLORS[i%COLORS.length]};"><span>${j.count}</span></div></div>
            <div class="chart-bar-val">${j.count}</div>
          </div>`).join(''):'<div style="color:var(--muted);font-size:13px;">No data.</div>'}
        </div>
      </div>
      <div class="card">
        <div class="card-title"><span class="card-title-accent"></span>Spend by charge entity</div>
        <div class="chart-bar-wrap">

function parseDate(str) {
  if (!str) return new Date(0);
  try {
    // Format 1: "DD/MM/YY, HH:MM:SS" (local storage format)
    if (str.includes('/') && str.includes(', ')) {
      const [datePart, timePart] = str.split(', ');
      const parts = datePart.split('/');
      const y = parts[2].length === 2 ? '20'+parts[2] : parts[2];
      return new Date(`${y}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}T${timePart}`);
    }
    // Format 2: ISO or other formats — let JS handle it
    const d = new Date(str);
    if (!isNaN(d.getTime())) return d;
    return new Date(0);
  } catch(e) { return new Date(0); }
}

function exportCSV() {
  const bookings = getBookings();
  if (!bookings.length) { alert('No bookings to export.'); return; }
  const headers = ['Ref','Job type','Reg','Make/model','Date required','Time','Priority','Raised by','Submitted at','Accepted at','Completed at','Cancelled at','Cancelled by','Charge to','Cost code','Cost (£)','Miles','Status','From','To','Claim ref','Keys','Fault','Colour','Mileage odo','Tasks','Device ID','Device location','Tyre qty','Tyre size','Tyre condition','Service type','Brake work','Other desc','Notes','Workshop notes'];
  const rows = bookings.map(b=>[b.ref,b.typeLabel,b.reg,b.make,b.dateRequired,b.timeRequired,b.priority,b.raisedBy,b.submittedAt,b.acceptedAt||'',b.completedAt||'',b.cancelledAt||'',b.cancelledBy||'',b.chargeTo,b.costCode,parseFloat(b.cost||0).toFixed(2),b.miles||'',b.status,b.from,b.to,b.claim,b.keys,b.fault,b.colour,b.mileageOdo,b.tasks,b.deviceId,b.deviceLoc,b.tyreQty||'',b.tyreSize||'',b.tyreCondition||'',b.serviceType||'',b.brakeWork||'',b.otherDesc||'',(b.notes||'').replace(/,/g,';'),(b.workshopNotes||'').replace(/,/g,';')]);
  const csv = [headers,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  const d=new Date(); a.download=`AFS_Bookings_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// POWER AUTOMATE EMAIL FUNCTIONS
// ═══════════════════════════════════════════════
function nameToEmail(fullName) {
  // Custom overrides for non-standard email addresses
  const overrides = {
    'Workshop Assistants': 'AFSWorkshopA@afsgroup.uk',
    'Workshop': 'servicing@afsgroup.uk'
  };
  if (overrides[fullName]) return overrides[fullName];
  // Default: "Craig Cameron" → "craig.cameron@afsgroup.uk"
  return fullName.toLowerCase().replace(/\s+/g, '.') + '@afsgroup.uk';
}

async function fireSubmissionEmail(booking) {
  const cfg = getCfg();
  const url = cfg.paSubmitUrl || 'https://defaultf4bcffa889564651ac3884050ed2cf.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ccefba5609bb423898f49d950783100c/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=qqix3M0B2ijRcyzSbwhcSuJcY6dcrkpw-Z_6H72wFiA';
  const payload = {
    eventType: 'NEW_BOOKING',
    toEmail: 'servicing@afsgroup.uk',
    ref: booking.ref,
    jobType: booking.typeLabel,
    reg: booking.reg,
    make: booking.make || '',
    dateRequired: booking.dateRequired,
    timeRequired: booking.timeRequired || '',
    priority: booking.priority,
    raisedBy: booking.raisedBy,
    raisedByEmail: nameToEmail(booking.raisedBy),
    chargeTo: booking.chargeTo,
    cost: parseFloat(booking.cost||0).toFixed(2),
    miles: booking.miles ? String(booking.miles) : '',
    from: booking.from || '',
    to: booking.to || '',
    claim: booking.claim || '',
    keys: booking.keys || '',
    notes: booking.notes || 'None',
    submittedAt: booking.submittedAt,
    tyreQty: booking.tyreQty || '',
    tyreSize: booking.tyreSize || '',
    tyreCondition: booking.tyreCondition || '',
    serviceType: booking.serviceType || '',
    brakeWork: booking.brakeWork || '',
    otherDesc: booking.otherDesc || '',
  };
  try {
    // Use text/plain to avoid CORS preflight — Power Automate receives body as triggerBody()
    await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn('Submission email failed:', e); }
}

  try {

  } catch(e) { console.warn('Status email failed:', e); }
}

async function testEndpoints() {
  const submitUrl = document.getElementById('cfg-submit-url').value.trim();
  const statusUrl = document.getElementById('cfg-status-url').value.trim();
  if (!submitUrl && !statusUrl) { alert('Paste at least one URL first.'); return; }
  const testPayload = { eventType: 'TEST', ref: 'TEST-000000-0000', message: 'AFS Portal connection test' };
  let results = [];
  for (const [label, url] of [['Flow 1', submitUrl], ['Flow 2', statusUrl]]) {
    if (!url) { results.push(`${label}: not configured`); continue; }
    try {
      await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(testPayload) });
      results.push(`${label}: ✓ Request sent (check your flow run history to confirm receipt)`);
    } catch(e) {
      results.push(`${label}: ✗ Failed — ${e.message}`);
    }
  }
  alert(results.join('\n\n'));
}
