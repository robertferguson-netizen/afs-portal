<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="pragma" content="no-cache"/>
<meta http-equiv="expires" content="0"/>
<!-- AFS Portal v3.5 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AFS Internal Operations Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0d1f3c;
  --navy2:#152a4e;
  --navy3:#1e3660;
  --mid:#2a4a7f;
  --accent:#e8312a;
  --accent2:#ff5c56;
  --gold:#f5a623;
  --white:#ffffff;
  --offwhite:#f4f6fa;
  --light:#e8edf5;
  --muted:#8a9bbf;
  --border:#2a3f63;
  --border-light:#dde3ef;
  --text:#0d1f3c;
  --card:#ffffff;
  --green:#00a86b;
  --green-light:#e6f7f1;
  --red:#e8312a;
  --red-light:#fef0ef;
  --amber:#f5a623;
  --amber-light:#fef8ec;
  --font:'Barlow',sans-serif;
  --font-display:'Barlow Condensed',sans-serif;
}
body{font-family:var(--font);background:var(--offwhite);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── LOGIN SCREEN ─────────────────────────────── */
#login-screen{
  position:fixed;inset:0;z-index:1000;
  background:var(--navy);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.login-logo{
  font-family:var(--font-display);font-size:42px;font-weight:800;
  color:var(--white);letter-spacing:0.04em;margin-bottom:4px;
}
.login-logo span{color:var(--accent);}
.login-tagline{font-size:13px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:48px;}
.login-card{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;padding:36px;width:100%;max-width:440px;
}
.login-card h2{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--white);margin-bottom:6px;}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:28px;}
.portal-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
.portal-tab{
  padding:14px;border-radius:7px;border:2px solid rgba(255,255,255,0.1);
  background:transparent;color:var(--muted);font-family:var(--font);font-size:13px;
  font-weight:600;cursor:pointer;transition:all 0.2s;text-align:center;letter-spacing:0.05em;text-transform:uppercase;
}
.portal-tab:hover{border-color:rgba(255,255,255,0.3);color:var(--white);}
.portal-tab.active{border-color:var(--accent);background:rgba(232,49,42,0.15);color:var(--white);}
.login-field{margin-bottom:16px;}
.login-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:6px;}
.login-field select{
  width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:var(--white);font-family:var(--font);font-size:14px;padding:11px 14px;
  border-radius:6px;outline:none;cursor:pointer;
}
.login-field select option{background:var(--navy2);color:var(--white);}
.login-btn{
  width:100%;padding:14px;background:var(--accent);color:var(--white);
  font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;border:none;border-radius:7px;cursor:pointer;
  transition:background 0.2s;margin-top:8px;
}
.login-btn:hover{background:var(--accent2);}
.login-divider{height:1px;background:rgba(255,255,255,0.08);margin:20px 0;}

/* ── APP SHELL ────────────────────────────────── */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.show{display:flex;}

/* ── TOP NAV ──────────────────────────────────── */
.topnav{
  background:var(--navy);height:60px;display:flex;align-items:center;
  justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(13,31,60,0.3);
}
.topnav-left{display:flex;align-items:center;gap:32px;}
.topnav-logo{font-family:var(--font-display);font-size:22px;font-weight:800;color:var(--white);letter-spacing:0.06em;}
.topnav-logo span{color:var(--accent);}
.topnav-portal{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;
  padding:4px 10px;border-radius:3px;
}
.portal-logistics{background:rgba(245,166,35,0.2);color:var(--gold);}
.portal-workshop{background:rgba(0,168,107,0.2);color:var(--green);}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{
  padding:8px 16px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);
  cursor:pointer;border-radius:5px;transition:all 0.15s;letter-spacing:0.02em;
  border:none;background:transparent;font-family:var(--font);
}
.nav-tab:hover{color:var(--white);background:rgba(255,255,255,0.08);}
.nav-tab.active{color:var(--white);background:rgba(255,255,255,0.12);}
.topnav-right{display:flex;align-items:center;gap:16px;}
.user-pill{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.08);border-radius:20px;padding:6px 14px 6px 8px;
}
.user-avatar{
  width:26px;height:26px;border-radius:50%;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--white);
}
.user-name{font-size:12px;font-weight:600;color:var(--white);}
.logout-btn{
  font-size:12px;color:var(--muted);cursor:pointer;background:none;border:none;
  font-family:var(--font);padding:4px 8px;border-radius:4px;
}
.logout-btn:hover{color:var(--white);}

/* ── PAGE CONTENT ─────────────────────────────── */
.page-content{flex:1;padding:28px;max-width:1200px;width:100%;margin:0 auto;}
.page{display:none;}
.page.active{display:block;}

/* ── PAGE HEADER ──────────────────────────────── */
.page-header{margin-bottom:28px;}
.page-header h1{font-family:var(--font-display);font-size:32px;font-weight:800;color:var(--navy);letter-spacing:0.02em;}
.page-header p{font-size:14px;color:var(--muted);margin-top:4px;}

/* ── CARDS ────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border-light);border-radius:10px;padding:24px;margin-bottom:20px;}
.card-title{font-family:var(--font-display);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--navy);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.card-title-accent{width:3px;height:16px;background:var(--accent);border-radius:2px;display:inline-block;}

/* ── FORM ELEMENTS ────────────────────────────── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row-1{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:16px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy);opacity:0.7;}
.field input,.field select,.field textarea{
  background:var(--offwhite);border:1.5px solid var(--border-light);
  color:var(--text);font-family:var(--font);font-size:14px;
  padding:10px 13px;border-radius:6px;outline:none;transition:border-color 0.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);background:var(--white);}
.field textarea{resize:vertical;min-height:80px;}
.field input.reg-input{font-weight:700;font-size:16px;text-transform:uppercase;letter-spacing:0.08em;}
.field-hint{font-size:11px;color:var(--muted);margin-top:3px;}

/* ── JOB TYPE SELECTOR ────────────────────────── */
.job-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.job-btn{
  background:var(--offwhite);border:2px solid var(--border-light);
  border-radius:8px;padding:14px 8px;cursor:pointer;text-align:center;
  font-family:var(--font);font-size:11px;font-weight:700;color:var(--muted);
  transition:all 0.15s;letter-spacing:0.04em;text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.job-btn:hover{border-color:var(--navy);color:var(--navy);background:var(--white);}
.job-btn.selected{border-color:var(--accent);background:rgba(232,49,42,0.05);color:var(--accent);}
.job-icon{font-size:22px;line-height:1;}

/* ── COST DISPLAY ─────────────────────────────── */
.cost-panel{
  background:var(--navy);border-radius:8px;padding:18px 22px;
  display:flex;align-items:center;justify-content:space-between;margin-top:12px;
}
.cost-panel-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.5);}
.cost-panel-basis{font-size:12px;color:rgba(255,255,255,0.4);margin-top:3px;}
.cost-panel-value{font-family:var(--font-display);font-size:36px;font-weight:800;color:var(--white);}
.cost-panel-value span{font-size:18px;opacity:0.6;margin-right:2px;}

/* ── MILEAGE CALCULATOR ───────────────────────── */
.mileage-calc{background:var(--offwhite);border:1.5px solid var(--border-light);border-radius:8px;padding:16px;margin-top:12px;}
.mileage-calc-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--navy);margin-bottom:12px;opacity:0.7;}
.postcode-row{display:grid;grid-template-columns:1fr auto 1fr auto;gap:10px;align-items:end;margin-bottom:12px;}
.postcode-arrow{font-size:18px;color:var(--muted);padding-bottom:10px;text-align:center;}
.calc-btn{
  padding:10px 16px;background:var(--navy);color:var(--white);border:none;
  border-radius:6px;font-family:var(--font);font-size:12px;font-weight:700;
  cursor:pointer;white-space:nowrap;letter-spacing:0.04em;height:42px;
}
.calc-btn:hover{background:var(--navy2);}
.mileage-result{
  display:none;background:var(--white);border:1px solid var(--border-light);
  border-radius:6px;padding:12px 16px;font-size:13px;color:var(--text);
}
.mileage-result.show{display:flex;justify-content:space-between;align-items:center;}
.mileage-breakdown{font-size:11px;color:var(--muted);margin-top:4px;}
.manual-miles{margin-top:10px;}

/* ── BUTTONS ──────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:6px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;letter-spacing:0.04em;text-transform:uppercase;}
.btn-primary{background:var(--accent);color:var(--white);}
.btn-primary:hover{background:var(--accent2);}
.btn-navy{background:var(--navy);color:var(--white);}
.btn-navy:hover{background:var(--navy2);}
.btn-ghost{background:transparent;color:var(--navy);border:2px solid var(--border-light);}
.btn-ghost:hover{border-color:var(--navy);}
.btn-green{background:var(--green);color:var(--white);}
.btn-green:hover{background:#008f5b;}
.btn-amber{background:var(--amber);color:var(--white);}
.btn-red{background:var(--red);color:var(--white);}
.btn-sm{padding:7px 14px;font-size:11px;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}

/* ── STAT CARDS ───────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{
  background:var(--white);border:1px solid var(--border-light);border-radius:10px;
  padding:20px;position:relative;overflow:hidden;
}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.stat-card.s-red::before{background:var(--accent);}
.stat-card.s-green::before{background:var(--green);}
.stat-card.s-amber::before{background:var(--amber);}
.stat-card.s-navy::before{background:var(--navy);}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px;}
.stat-value{font-family:var(--font-display);font-size:36px;font-weight:800;color:var(--navy);line-height:1;}
.stat-sub{font-size:12px;color:var(--muted);margin-top:6px;}

/* ── TABLE ────────────────────────────────────── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:2px solid var(--border-light);white-space:nowrap;}
td{padding:12px;border-bottom:1px solid var(--border-light);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--offwhite);}
.ref-badge{font-family:'Barlow Condensed',monospace;font-size:13px;font-weight:700;background:var(--navy);color:var(--white);padding:3px 9px;border-radius:4px;letter-spacing:0.05em;}
.reg-badge{font-weight:700;font-size:13px;color:var(--navy);letter-spacing:0.05em;}

/* ── STATUS TAGS ──────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;}
.tag::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:0.8;}
.tag-pending{background:var(--amber-light);color:#b57a00;}
.tag-accepted{background:rgba(42,74,127,0.1);color:var(--navy);}
.tag-declined{background:var(--red-light);color:var(--red);}
.tag-completed{background:var(--green-light);color:#007a50;}
.tag-cancelled{background:#f0f0f5;color:#666;border:1px solid #ccc;}
.tag-type{background:var(--offwhite);color:var(--navy);border:1px solid var(--border-light);}

/* ── FILTER ROW ───────────────────────────────── */
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-row select,.filter-row input{
  background:var(--white);border:1.5px solid var(--border-light);color:var(--text);
  font-family:var(--font);font-size:13px;padding:8px 12px;border-radius:6px;outline:none;
}
.filter-row input{flex:1;min-width:160px;}
.filter-row select:focus,.filter-row input:focus{border-color:var(--navy);}

/* ── BOOKING DETAIL MODAL ─────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(13,31,60,0.6);z-index:500;align-items:center;justify-content:center;padding:20px;}
.overlay.show{display:flex;}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-header{background:var(--navy);padding:20px 24px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center;}
.modal-header h2{font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--white);letter-spacing:0.05em;}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.5);font-size:22px;cursor:pointer;line-height:1;padding:0 4px;}
.modal-close:hover{color:var(--white);}
.modal-body{padding:24px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.detail-item{background:var(--offwhite);border-radius:6px;padding:12px;}
.detail-item-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:4px;}
.detail-item-value{font-size:14px;font-weight:600;color:var(--navy);}
.detail-item.full{grid-column:1/-1;}
.notes-box{background:var(--offwhite);border-radius:6px;padding:14px;margin-bottom:16px;}
.notes-box label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);display:block;margin-bottom:8px;}
.notes-box textarea{width:100%;background:var(--white);border:1.5px solid var(--border-light);border-radius:5px;font-family:var(--font);font-size:13px;padding:10px;outline:none;resize:vertical;min-height:80px;}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap;}

/* ── SUCCESS OVERLAY ──────────────────────────── */
.success-overlay{display:none;position:fixed;inset:0;background:rgba(13,31,60,0.7);z-index:600;align-items:center;justify-content:center;}
.success-overlay.show{display:flex;}
.success-modal{background:var(--white);border-radius:12px;padding:40px;text-align:center;max-width:420px;width:90%;}
.success-icon{font-size:56px;margin-bottom:16px;display:block;}
.success-ref{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--navy);margin:8px 0;}
.success-detail{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px;white-space:pre-line;}
.wa-panel{background:var(--offwhite);border:1.5px solid var(--border-light);border-radius:8px;padding:16px;text-align:left;margin-bottom:20px;}
.wa-panel-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--green);margin-bottom:8px;}
.wa-panel-text{font-family:monospace;font-size:12px;white-space:pre-wrap;color:var(--text);line-height:1.6;}

/* ── CHARTS ───────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.chart-bar-wrap{margin-top:12px;}
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.chart-bar-label{font-size:12px;font-weight:600;color:var(--navy);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chart-bar-track{flex:1;height:24px;background:var(--offwhite);border-radius:4px;overflow:hidden;}
.chart-bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;display:flex;align-items:center;padding-left:8px;}
.chart-bar-fill span{font-size:11px;font-weight:700;color:var(--white);}
.chart-bar-val{font-size:12px;font-weight:700;color:var(--navy);width:60px;text-align:right;flex-shrink:0;}
.pie-wrap{display:flex;align-items:center;gap:20px;margin-top:12px;}
.pie-legend{flex:1;}
.pie-legend-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;}
.pie-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.perf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
.perf-card{background:var(--offwhite);border-radius:8px;padding:14px;}
.perf-card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:6px;}
.perf-card-value{font-family:var(--font-display);font-size:28px;font-weight:800;color:var(--navy);}
.perf-card-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* ── EMPTY STATE ──────────────────────────────── */
.empty-state{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-icon{font-size:40px;display:block;margin-bottom:12px;opacity:0.3;}
.empty-state p{font-size:14px;}

/* ── WARN BOX ─────────────────────────────────── */
.warn-box{background:var(--amber-light);border:1.5px solid #f5d080;border-radius:6px;padding:10px 14px;font-size:12px;color:#7a5000;margin-top:12px;}
.info-box{background:rgba(42,74,127,0.06);border:1.5px solid rgba(42,74,127,0.15);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--navy);margin-top:12px;}

/* ── TIMELINE ─────────────────────────────────── */
.timeline{display:flex;gap:0;margin:16px 0;}
.timeline-step{flex:1;text-align:center;position:relative;}
.timeline-step:not(:last-child)::after{content:'';position:absolute;top:14px;left:50%;right:-50%;height:2px;background:var(--border-light);}
.timeline-step.done:not(:last-child)::after{background:var(--green);}
.timeline-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border-light);background:var(--white);margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;z-index:1;}
.timeline-step.done .timeline-dot{background:var(--green);border-color:var(--green);color:var(--white);}
.timeline-step.current .timeline-dot{background:var(--amber);border-color:var(--amber);color:var(--white);}
.timeline-step-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}
.timeline-step.done .timeline-step-label{color:var(--green);}
.timeline-step.current .timeline-step-label{color:var(--amber);}

/* ── RESPONSIVE ───────────────────────────────── */
@media(max-width:768px){
  .job-grid{grid-template-columns:repeat(2,1fr);}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .form-row,.form-row-3{grid-template-columns:1fr;}
  .charts-grid{grid-template-columns:1fr;}
  .page-content{padding:16px;padding-bottom:80px;}
  .topnav{padding:0 16px;}
  .nav-tabs{display:none;}
  .bottom-nav{display:flex !important;}
}

/* ── SPIN ─────────────────────────────────────── */

// ── SHARED DATABASE — SharePoint REST API ──────────────────────────────────
const SP_SITE = 'https://afslogisticsltd.sharepoint.com/sites/AFSWorkshop';
const SP_LIST = 'AFSBookings';

// Convert SharePoint item to booking object
function spToBooking(item) {
  return {
    id: item.Id,
    ref: item.BookingRef || item.Title,
    type: item.JobType ? Object.keys(JOB_MAP).find(k => JOB_MAP[k].label === item.JobType) || '' : '',
    typeLabel: item.JobType || '',
    status: item.Status || 'Pending',
    raisedBy: item.RaisedBy || '',
    submittedAt: item.SubmittedAt || '',
    dateRequired: item.DateRequired || '',
    timeRequired: item.TimeRequired || '',
    priority: item.Priority || 'Standard',
    reg: item.VehicleReg || '',
    make: item.MakeModel || '',
    chargeTo: item.ChargeTo || '',
    costCode: item.CostCode || '',
    cost: parseFloat(String(item.Cost||0).replace(/[^0-9.]/g,'')) || 0,
    miles: parseFloat(String(item.Miles||0).replace(/[^0-9.]/g,'')) || 0,
    notes: item.Notes || '',
    workshopNotes: item.WorkshopNotes || '',
    acceptedAt: item.AcceptedAt || null,
    acceptedBy: item.AcceptedBy || null,
    completedAt: item.CompletedAt || null,
    declinedAt: item.DeclinedAt || null,
    cancelledAt: item.CancelledAt || null,
    cancelledBy: item.CancelledBy || null,
    from: item.FromLocation || '',
    to: item.ToLocation || '',
  };
}

async function dbGetBookings() {
  try {
    const res = await fetch('https://defaultf4bcffa889564651ac3884050ed2cf.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/c0b117808bec4f7a82d67d78f878a872/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=mtIALmc1npF25MYhNrMj-knE00tU5eJj6aStDdZTTII', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({action:'get'})
    });
    if (!res.ok) throw new Error('Get bookings failed: ' + res.status);
    const text = await res.text();
    // PA returns the array as a string, parse it
    let items;
    try { items = JSON.parse(text); } catch(e) { items = JSON.parse(JSON.parse(text)); }
    if (!Array.isArray(items)) throw new Error('Invalid response');
    const bookings = items.map(spToBooking).filter(b => b.status !== 'Deleted');
    localStorage.setItem('afs_bookings_v3', JSON.stringify(bookings));
    return bookings;
  } catch(e) {
    console.warn('Get bookings failed, using local cache:', e);
    return JSON.parse(localStorage.getItem('afs_bookings_v3') || '[]');
  }
}

async function dbSaveBooking(booking) {
  // Save locally immediately
  const bookings = JSON.parse(localStorage.getItem('afs_bookings_v3') || '[]');
  const idx = bookings.findIndex(b => b.ref === booking.ref);
  if (idx >= 0) bookings[idx] = booking; else bookings.push(booking);
  localStorage.setItem('afs_bookings_v3', JSON.stringify(bookings));
  // Update SharePoint via Power Automate flow
  try {
    await fetch('https://defaultf4bcffa889564651ac3884050ed2cf.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/0d9d269a1d3549ca9da496af62b5e0a3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=FYZusc_ZDk3VA_NIRKn2qo9qpUdnrMZjqPHM8ZGf7Dg', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bookingRef: booking.ref,
        status: booking.status || '',
        workshopNotes: booking.workshopNotes || '',
        acceptedAt: booking.acceptedAt || '',
        acceptedBy: booking.acceptedBy || '',
        completedAt: booking.completedAt || '',
        declinedAt: booking.declinedAt || '',
        cancelledAt: booking.cancelledAt || '',
        cancelledBy: booking.cancelledBy || ''
      })
    });
  } catch(e) { console.warn('Update booking failed:', e); }
}

async function dbDeleteBooking(ref) {
  const bookings = JSON.parse(localStorage.getItem('afs_bookings_v3') || '[]');
  const filtered = bookings.filter(b => b.ref !== ref);
  localStorage.setItem('afs_bookings_v3', JSON.stringify(filtered));
  // Use update flow to set status to Deleted so it can be filtered out on read
  try {
    await fetch('https://defaultf4bcffa889564651ac3884050ed2cf.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/0d9d269a1d3549ca9da496af62b5e0a3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=FYZusc_ZDk3VA_NIRKn2qo9qpUdnrMZjqPHM8ZGf7Dg', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bookingRef: ref,
        status: 'Deleted',
        workshopNotes: '',
        acceptedAt: '', acceptedBy: '',
        completedAt: '', declinedAt: '',
        cancelledAt: '', cancelledBy: ''
      })
    });
  } catch(e) { console.warn('Delete failed:', e); }
}

const CALLOUT = 40;
const FREE_MILES = 20;
const PER_MILE = 1.5;

function calcMileageCost(miles) {
  if (!miles || miles <= 0) return CALLOUT;
  const extra = Math.max(0, miles - FREE_MILES);
  return CALLOUT + (extra * PER_MILE);
}

function formatCost(n) { return '£' + parseFloat(n||0).toFixed(2); }

function genRef(type) {
  const prefixes = {delivery:'DEL',collection:'COL',recovery:'REC',prep:'PREP',valet:'VAL','samsara-rem':'SREM','samsara-ins':'SINS','livery-std':'LIV','livery-ext':'LIVX','livery-dpd':'LDPD'};
  const p = prefixes[type] || 'BKG';
  const d = new Date();
  const ds = `${d.getDate().toString().padStart(2,'0')}${(d.getMonth()+1).toString().padStart(2,'0')}${String(d.getFullYear()).slice(2)}`;
  const rand = Math.floor(1000+Math.random()*9000);
  return `${p}-${ds}-${rand}`;
}

function buildNav() {
  const tabs = TABS[currentPortal];
  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = '';

  // Desktop nav
  tabs.forEach((t,i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (i===0?' active':'');
    btn.textContent = t.label;
    btn.onclick = () => showTab(t.id);
    btn.id = 'nav-' + t.id;
    nav.appendChild(btn);
  });

  // Mobile bottom nav
  const ICONS = {new:'➕', 'my-bookings':'📋', inbox:'📥', all:'📄', analytics:'📊', settings:'⚙️'};
  const LABELS = {new:'New', 'my-bookings':'Requests', inbox:'Inbox', all:'All', analytics:'Analytics', settings:'Settings'};
  const bottomNav = document.getElementById('bottom-nav-items');
  bottomNav.innerHTML = '';
  tabs.forEach((t,i) => {
    const btn = document.createElement('button');
    btn.className = 'bottom-nav-item' + (i===0?' active':'');
    btn.innerHTML = `<span>${ICONS[t.id]||'📋'}</span><span>${LABELS[t.id]||t.label}</span>`;
    btn.onclick = () => showTab(t.id);
    btn.id = 'bottom-nav-' + t.id;
    bottomNav.appendChild(btn);
  });

  showTab(tabs[0].id);
}

async function showTab(id) {
  activeTab = id;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(t=>t.classList.remove('active'));
  const navEl = document.getElementById('nav-'+id);
  if (navEl) navEl.classList.add('active');
  const bottomEl = document.getElementById('bottom-nav-'+id);
  if (bottomEl) bottomEl.classList.add('active');
  const pc = document.getElementById('page-content');
  pc.innerHTML = '';

  if (currentPortal === 'logistics') {
    if (id==='new') { pc.appendChild(renderNewBooking()); return; }
    if (id==='settings') { pc.appendChild(renderSettings()); return; }
  } else {
    if (id==='settings') { pc.appendChild(renderSettings()); return; }
  }

  // Show loading spinner for data pages
  pc.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted);font-size:14px;"><span class="spin" style="border-color:var(--border-light);border-top-color:var(--navy);width:24px;height:24px;"></span><div style="margin-top:12px;">Loading bookings...</div></div>';

  // Load fresh data from shared DB
  const bookings = await dbGetBookings();

  pc.innerHTML = '';
  if (currentPortal === 'logistics') {
    if (id==='my-bookings') pc.appendChild(renderMyBookings(bookings));
    if (id==='analytics') pc.appendChild(renderAnalytics('logistics', bookings));
  } else {
    if (id==='inbox') pc.appendChild(renderInbox(bookings));
    if (id==='all') pc.appendChild(renderAllBookings(bookings));
    if (id==='analytics') pc.appendChild(renderAnalytics('workshop', bookings));

}

async function lookupDistance() {
  const from = document.getElementById('pc-from').value.trim().replace(/\s+/g,'').toUpperCase();
  const to   = document.getElementById('pc-to').value.trim().replace(/\s+/g,'').toUpperCase();
  if (!from || !to) { alert('Please enter both postcodes.'); return; }
  const res = document.getElementById('mileage-result');
  res.className = 'mileage-result show';
  res.innerHTML = '<span><span class="spin"></span> Calculating distance...</span>';
  try {
    const url = `https://api.distancematrix.ai/maps/api/distancematrix/json?origins=${from}&destinations=${to}&key=FREE_TIER`;
    // Fallback: use postcodes.io for lat/lng then haversine
    const fromR = await fetch(`https://api.postcodes.io/postcodes/${from}`);
    const toR   = await fetch(`https://api.postcodes.io/postcodes/${to}`);
    const fromD = await fromR.json();
    const toD   = await toR.json();
    if (fromD.status !== 200 || toD.status !== 200) throw new Error('Invalid postcode');
    const miles = haversine(fromD.result.latitude, fromD.result.longitude, toD.result.latitude, toD.result.longitude);
    const oneway = Math.round(miles);
    calcMiles = oneway * 2; // return journey
    const cost = calcMileageCost(calcMiles);
    calcCost = cost;
    const extra = Math.max(0, calcMiles - FREE_MILES);
    const breakdown = `${oneway} miles each way × 2 (return) = ${calcMiles} miles — £${CALLOUT} callout + ${Math.max(0,calcMiles-FREE_MILES)} miles × £${PER_MILE} = ${formatCost(cost)}`;
    res.innerHTML = `<div><div style="font-weight:700;font-size:14px;color:var(--navy);">${oneway} miles each way (${calcMiles} miles return)</div><div class="mileage-breakdown">${breakdown}</div></div><div style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--accent);">${formatCost(cost)}</div>`;
    showCostPanel(formatCost(cost), `${oneway} mi each way × 2 = ${calcMiles} mi return — postcodes ${from} → ${to}`);
    document.getElementById('manual-miles').value = '';
  } catch(e) {
    res.innerHTML = `<span style="color:var(--red);">⚠ Couldn't look up those postcodes. Please enter miles manually below.</span>`;
  }
}

function haversine(lat1,lon1,lat2,lon2) {
  const R=3958.8, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function onManualMiles() {
  const m = parseFloat(document.getElementById('manual-miles').value);
  if (isNaN(m) || m < 0) return;
  const oneway = Math.round(m);
  calcMiles = oneway * 2; // return journey
  calcCost = calcMileageCost(calcMiles);
  const extra = Math.max(0, calcMiles - FREE_MILES);
  const basis = `${oneway} miles × 2 (return) = ${calcMiles} miles total`;
  showCostPanel(formatCost(calcCost), basis);
  const res = document.getElementById('mileage-result');
  if (res) { res.className='mileage-result show'; res.innerHTML=`<div><div style="font-weight:700;">Manual entry: ${oneway} miles each way (${calcMiles} miles return)</div></div><div style="font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--accent);">${formatCost(calcCost)}</div>`; }
}

async function submitNewBooking() {
  if (!activeJobType) { alert('Please select a job type.'); return; }
  const date = document.getElementById('nb-date').value;
  const reg  = document.getElementById('vf-reg')?.value?.trim()?.toUpperCase();
  const charge = document.getElementById('nb-charge').value;
  if (!date) { alert('Please select a required date.'); return; }
  if (!reg) { alert('Please enter the vehicle registration.'); return; }
  if (!charge) { alert('Please select a charge-to entity.'); return; }
  const job = JOB_MAP[activeJobType];
  if (job.costType === 'mileage' && calcCost === 0) { alert('Please calculate or enter the distance/mileage for this job type.'); return; }

  const booking = {
    ref: genRef(activeJobType),
    type: activeJobType,
    typeLabel: job.label,
    status: 'Pending',
    raisedBy: currentUser,
    submittedAt: ts(),
    dateRequired: date,
    timeRequired: document.getElementById('nb-time').value,
    priority: document.getElementById('nb-priority').value,
    chargeTo: charge,
    costCode: document.getElementById('nb-costcode').value,
    cost: calcCost,
    miles: calcMiles,
    reg: reg,
    make: document.getElementById('vf-make')?.value || '',
    notes: document.getElementById('nb-notes').value,
    workshopNotes: '',
    acceptedAt: null, declinedAt: null, completedAt: null,
    acceptedBy: null,
    // extra fields
    from: document.getElementById('vf-from')?.value || '',
    to: document.getElementById('vf-to')?.value || '',
    claim: document.getElementById('vf-claim')?.value || '',
    keys: document.getElementById('vf-keys')?.value || '',
    fault: document.getElementById('vf-fault')?.value || '',
    driveable: document.getElementById('vf-drive')?.value || '',
    colour: document.getElementById('vf-colour')?.value || document.getElementById('vf-livery-colour')?.value || '',
    mileageOdo: document.getElementById('vf-mileageodometer')?.value || '',
    tasks: document.getElementById('vf-tasks')?.value || '',
    valetLevel: document.getElementById('vf-valet-level')?.value || '',
    condition: document.getElementById('vf-condition')?.value || '',
    deviceId: document.getElementById('vf-device-id')?.value || '',
    deviceLoc: document.getElementById('vf-device-loc')?.value || '',
  };

  await dbSaveBooking(booking);

  // Fire Power Automate submission email
  fireSubmissionEmail(booking);

  // Show success
  document.getElementById('s-ref').textContent = booking.ref;
  document.getElementById('s-detail').textContent = `${booking.typeLabel} — ${booking.reg}${booking.make?' '+booking.make:''}\nRequired: ${booking.dateRequired} ${booking.timeRequired}\nPriority: ${booking.priority} | Charge to: ${booking.chargeTo}\nEstimated cost: ${formatCost(booking.cost)}\nSubmitted: ${booking.submittedAt}`;

  const waWrap = document.getElementById('s-wa');
  if (document.getElementById('nb-wa')?.checked) {
    waWrap.style.display = 'block';
    document.getElementById('s-wa-text').textContent = `*AFS Workshop — New Request*\nRef: ${booking.ref}\nJob: ${booking.typeLabel}\nVehicle: ${booking.reg} ${booking.make}\nDate needed: ${booking.dateRequired} ${booking.timeRequired}\nPriority: ${booking.priority}\nCharge to: ${booking.chargeTo}\nCost: ${formatCost(booking.cost)}\nNotes: ${booking.notes||'None'}\nSubmitted by: ${booking.raisedBy}`;
  } else { waWrap.style.display = 'none'; }

  document.getElementById('success-overlay').classList.add('show');
}

async function deleteBooking(ref) {
  if (!confirm(`Permanently delete booking ${ref}?\n\nThis cannot be undone.`)) return;
  await dbDeleteBooking(ref);
  closeModal();
  setTimeout(() => showTab(activeTab), 2000);
}

function confirmCancel(ref) {
  const b = getBookings().find(x=>x.ref===ref);
  if (!b) return;
  const msg = b.status === 'Accepted'
    ? `Cancel accepted booking ${ref}?\n\nThis will notify the raiser and the workshop. Are you sure?`
    : `Cancel booking ${ref}?\n\nAre you sure?`;
  if (confirm(msg)) { updateBookingStatus(ref, 'Cancelled'); }
}

function closeModal() { document.getElementById('detail-overlay').classList.remove('show'); }

async function updateBookingStatus(ref, status) {
  saveWorkshopNotes(ref, false);
  const bookings = getBookings();
  const b = bookings.find(x=>x.ref===ref);
  if (!b) return;
  b.status = status;
  if (status==='Accepted') { b.acceptedAt=ts(); b.acceptedBy=currentUser; }
  if (status==='Completed') { b.completedAt=ts(); }
  if (status==='Declined') { b.declinedAt=ts(); }
  if (status==='Cancelled') { b.cancelledAt=ts(); b.cancelledBy=currentUser; }
  await dbSaveBooking(b);
  // Fire Power Automate status update email to raiser
  fireStatusEmail(b, status);
  closeModal();
  // Wait briefly for PA flow to update SP, then reload fresh from DB
  setTimeout(() => showTab(activeTab), 2000);
}

async function saveWorkshopNotes(ref, showFeedback=true) {
  const notes = document.getElementById('ws-notes')?.value;
  if (notes === undefined) return;
  const bookings = getBookings();
  const b = bookings.find(x=>x.ref===ref);
  if (b) { b.workshopNotes = notes; saveBookings(bookings); await dbSaveBooking(b); }
  if (showFeedback) { closeModal(); setTimeout(() => showTab(activeTab), 2000); }
}

function parseDate(str) {
  if (!str) return new Date(0);
  try {
    // Format 1: "DD/MM/YY, HH:MM:SS" (local storage format)
    if (str.includes('/') && str.includes(', ')) {
      const [datePart, timePart] = str.split(', ');
      const parts = datePart.split('/');
      const y = parts[2].length === 2 ? '20'+parts[2] : parts[2];
      return new Date(`${y}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}T${timePart}`);
    }
    // Format 2: ISO or other formats — let JS handle it
    const d = new Date(str);
    if (!isNaN(d.getTime())) return d;
    return new Date(0);
  } catch(e) { return new Date(0); }
}

function nameToEmail(fullName) {
  // Custom overrides for non-standard email addresses
  const overrides = {

  };
  if (overrides[fullName]) return overrides[fullName];

  return fullName.toLowerCase().replace(/\s+/g, '.') + '@afsgroup.uk';
}

async function fireSubmissionEmail(booking) {

  const payload = {

async function fireStatusEmail(booking, status) {
  const cfg = getCfg();
  const url = cfg.paStatusUrl || 'https://defaultf4bcffa889564651ac3884050ed2cf.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9b81351b506b4e558a5e44a769bb6b04/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=Lni8UuBlLI7c1PhThzCiPGNQ4j2WuGEJu9qxDdVmzpc';
  const toEmail = nameToEmail(booking.raisedBy);
  const statusMessages = {
    Accepted: `Your booking ${booking.ref} has been accepted by the workshop.`,
    Declined: `Your booking ${booking.ref} has been declined by the workshop. Please contact the team for more information.`,
    Completed: `Your booking ${booking.ref} has been marked as completed.`,
    Cancelled: `Your booking ${booking.ref} has been cancelled by ${booking.cancelledBy||'the team'}. Please raise a new request if still required.`
  };
  const payload = {
    eventType: 'STATUS_UPDATE',
    toEmail: toEmail,
    raisedBy: booking.raisedBy,
    ref: booking.ref,
    jobType: booking.typeLabel,
    reg: booking.reg,
    make: booking.make || '',
    dateRequired: booking.dateRequired,
    newStatus: status,
    statusMessage: statusMessages[status] || '',
    updatedBy: currentUser,
    updatedAt: ts(),
    workshopNotes: booking.workshopNotes || '',
    cost: parseFloat(booking.cost||0).toFixed(2),
  };
  try {
    await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn('Status email failed:', e); }
}

function saveSettings() {
  const cfg = getCfg();
  cfg.paSubmitUrl = document.getElementById('cfg-submit-url').value.trim();
  cfg.paStatusUrl = document.getElementById('cfg-status-url').value.trim();
  saveCfg(cfg);
  const saved = document.getElementById('cfg-saved');
  saved.style.display = 'inline';
  setTimeout(()=>saved.style.display='none', 2500);
  // Refresh status indicators
  document.getElementById('status-flow1').textContent = cfg.paSubmitUrl ? '✓ Configured' : '⚠ Not configured';
  document.getElementById('status-flow1').style.color = cfg.paSubmitUrl ? 'var(--green)' : 'var(--amber)';
  document.getElementById('status-flow2').textContent = cfg.paStatusUrl ? '✓ Configured' : '⚠ Not configured';
  document.getElementById('status-flow2').style.color = cfg.paStatusUrl ? 'var(--green)' : 'var(--amber)';
}

async function testEndpoints() {
  const submitUrl = document.getElementById('cfg-submit-url').value.trim();
  const statusUrl = document.getElementById('cfg-status-url').value.trim();
  if (!submitUrl && !statusUrl) { alert('Paste at least one URL first.'); return; }
  const testPayload = { eventType: 'TEST', ref: 'TEST-000000-0000', message: 'AFS Portal connection test' };
  let results = [];
  for (const [label, url] of [['Flow 1', submitUrl], ['Flow 2', statusUrl]]) {
    if (!url) { results.push(`${label}: not configured`); continue; }
    try {
      await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(testPayload) });
      results.push(`${label}: ✓ Request sent (check your flow run history to confirm receipt)`);
    } catch(e) {
      results.push(`${label}: ✗ Failed — ${e.message}`);
    }
  }
  alert(results.join('\n\n'));
}
